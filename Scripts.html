<script>
  /* ═══════════════════════════════════════════════════════════
     TRIPLE A — SISTEMA DE COTIZACIONES
     Archivo: Scripts.html  (Frontend JavaScript)
     ═══════════════════════════════════════════════════════════ */

  // ── Estado global ──────────────────────────────────────────
  var APP = {
    clientes: [],
    items: [],
    itemsCargados: false,
    itemsCargando: false,
    itemsCallbacksPendientes: [],
    trabajadores: [],
    dashboardCotizaciones: [],
    dashboardContratosRes: null,
    itemsContratoAsignacion: [],
    asignacionEditId: null,
    pagoEditId: null,
    trabajadorActual: null,
    trabajadorDetalle: null,
    contratosTrabajador: [],
    itemsCotizacion: [],
    params: {},
    tipoActual: 'IVA',
    cotActual: null,  // ID de la cot. activa en modal de acciones
    cotActualConsecutivo: '',
    cotActualEstado: 'Borrador',
    cotActualRowIndex: '',
    cotEditId: null,
    cotActualActiva: true,
    itemCatalogoEditId: null,
    apuContext: null
  };

  function enRuntimeAppsScript_() {
    return !!(window.google && google.script && google.script.run);
  }

  function getPreferredTheme_() {
    try {
      var stored = localStorage.getItem('triplea.theme');
      if (stored === 'light' || stored === 'dark') return stored;
    } catch (e) { }
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }

  function syncThemeButton_() {
    var btn = document.getElementById('btn-theme-toggle');
    if (!btn) return;
    var isLight = document.body.classList.contains('theme-light');
    btn.textContent = isLight ? '☀' : '☾';
    btn.title = isLight ? 'Cambiar a tema oscuro' : 'Cambiar a tema claro';
    btn.setAttribute('aria-label', btn.title);
  }

  function applyTheme_(theme) {
    var isLight = theme === 'light';
    document.body.classList.toggle('theme-light', isLight);
    try {
      localStorage.setItem('triplea.theme', isLight ? 'light' : 'dark');
    } catch (e) { }
    syncThemeButton_();
  }

  function initTheme() {
    applyTheme_(getPreferredTheme_());
  }

  function toggleTheme() {
    applyTheme_(document.body.classList.contains('theme-light') ? 'dark' : 'light');
  }

  function bindNavegacionSidebar_() {
    var items = document.querySelectorAll('.nav-item[data-vista]');
    items.forEach(function (item) {
      if (item.dataset.boundVista === '1') return;
      item.dataset.boundVista = '1';
      item.addEventListener('click', function () {
        var vista = item.getAttribute('data-vista');
        if (vista) mostrarVista(vista);
      });
    });
  }

  // ── INICIALIZACIÓN ─────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    bindNavegacionSidebar_();
    initSidebarState();
    initTheme();
    setFechaHoy();
    if (enRuntimeAppsScript_()) {
      cargarDatosIniciales();
    } else {
      // Modo local (archivo combinado de prueba): permite navegar sin backend.
      mostrarVista('dashboard');
      toast('Modo local: sin conexion a Apps Script', 'error');
    }
  });

  function initSidebarState() {
    try {
      var collapsed = localStorage.getItem('triplea.sidebarCollapsed') === '1';
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      var btn = document.getElementById('btn-toggle-sidebar');
      if (btn) btn.textContent = collapsed ? '→' : '☰';
    } catch (e) {
      // localStorage can fail in restricted contexts; ignore gracefully.
    }
  }

  function toggleSidebar() {
    var collapsed = !document.body.classList.contains('sidebar-collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
    var btn = document.getElementById('btn-toggle-sidebar');
    if (btn) btn.textContent = collapsed ? '→' : '☰';
    try {
      localStorage.setItem('triplea.sidebarCollapsed', collapsed ? '1' : '0');
    } catch (e) {
      // Ignore storage errors.
    }
  }

  function setFechaHoy() {
    var hoy = new Date();
    var iso = hoy.getFullYear() + '-' +
      String(hoy.getMonth() + 1).padStart(2, '0') + '-' +
      String(hoy.getDate()).padStart(2, '0');
    document.getElementById('fecha_cot').value = iso;
  }

  function setBotonGuardarTexto(texto) {
    var btn = document.getElementById('btn-guardar-cot');
    if (btn) btn.textContent = texto;
  }

  function cargarDatosIniciales() {
    mostrarLoader('Cargando datos...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error al cargar: ' + (res.error || ''), 'error'); return; }
        APP.clientes = res.clientes || [];
        APP.items = res.items || [];
        APP.itemsCargados = APP.items.length > 0;
        APP.trabajadores = res.trabajadores || [];
        APP.params = res.params || {};
        poblarSelectClientes();
        mostrarVista('dashboard');
        toast('Sistema listo', 'ok');
      })
      .withFailureHandler(function (e) {
        cargarDatosInicialesFallback(e);
      })
      .getDatosInicialesRapido();
  }

  function cargarDatosInicialesFallback(errorRapido) {
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error al cargar: ' + (res.error || ''), 'error'); return; }
        APP.clientes = res.clientes || [];
        APP.items = res.items || [];
        APP.itemsCargados = APP.items.length > 0;
        APP.trabajadores = res.trabajadores || [];
        APP.params = res.params || {};
        poblarSelectClientes();
        mostrarVista('dashboard');
        toast('Sistema listo', 'ok');
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        var msg = errorRapido ? (errorRapido.message + ' | ') : '';
        toast('Error de conexión: ' + msg + e.message, 'error');
      })
      .getDatosIniciales();
  }

  function asegurarItemsCargados(onReady, onError, conLoader) {
    if (APP.itemsCargados && APP.items.length) {
      if (onReady) onReady(APP.items);
      return;
    }

    if (onReady) APP.itemsCallbacksPendientes.push(onReady);

    if (APP.itemsCargando) return;
    APP.itemsCargando = true;
    if (conLoader) mostrarLoader('Cargando catálogo...');

    google.script.run
      .withSuccessHandler(function (items) {
        if (conLoader) ocultarLoader();
        APP.itemsCargando = false;
        APP.items = items || [];
        APP.itemsCargados = true;
        var pendientes = APP.itemsCallbacksPendientes.splice(0, APP.itemsCallbacksPendientes.length);
        pendientes.forEach(function (cb) {
          try { cb(APP.items); } catch (e) { }
        });
      })
      .withFailureHandler(function (e) {
        if (conLoader) ocultarLoader();
        APP.itemsCargando = false;
        APP.itemsCargados = false;
        APP.itemsCallbacksPendientes = [];
        if (onError) onError(e);
        toast('Error cargando catálogo: ' + e.message, 'error');
      })
      .getItems();
  }

  function refrescarCatalogoItems(onReady, conLoader) {
    if (conLoader) mostrarLoader('Cargando catálogo...');
    google.script.run
      .withSuccessHandler(function (items) {
        if (conLoader) ocultarLoader();
        APP.items = items || [];
        APP.itemsCargados = true;
        if (document.getElementById('vista-items') && document.getElementById('vista-items').style.display !== 'none') {
          renderTablaItems();
        }
        if (document.getElementById('modal-item') && document.getElementById('modal-item').style.display !== 'none') {
          renderCatalogo((document.getElementById('buscar_item').value || '').toLowerCase());
        }
        if (typeof onReady === 'function') onReady(APP.items);
      })
      .withFailureHandler(function (e) {
        if (conLoader) ocultarLoader();
        toast('Error cargando catálogo: ' + e.message, 'error');
        if (typeof onReady === 'function') onReady([]);
      })
      .getItems();
  }

  function cargarItems() {
    refrescarCatalogoItems(null, false);
  }

  // ── NAVEGACIÓN ─────────────────────────────────────────────
  function mostrarVista(nombre) {
    document.querySelectorAll('.vista').forEach(function (v) { v.style.display = 'none'; });
    document.querySelectorAll('.nav-item').forEach(function (n) { n.classList.remove('active'); });

    var el = document.getElementById('vista-' + nombre);
    if (el) el.style.display = 'block';

    var navMap = { dashboard: 'Dashboard', nueva: 'Nueva Cotización', lista: 'Cotizaciones', clientes: 'Clientes', items: 'Catálogo', trabajadores: 'Trabajadores', contratos: 'Contratos' };
    document.getElementById('topbarTitle').textContent = navMap[nombre] || '';

    var actionsEl = document.getElementById('topbarActions');
    if (nombre === 'nueva') {
      actionsEl.innerHTML = '<button class="btn btn-ghost" onclick="limpiarFormulario()">↺ Limpiar</button><button id="btn-guardar-cot" class="btn btn-primary" onclick="guardarCotizacion()">Guardar Cotización</button>';
    } else if (nombre === 'items') {
      actionsEl.innerHTML = '<button class="btn btn-ghost" onclick="refrescarCatalogoItems()">↺ Actualizar</button><button class="btn btn-primary" onclick="mostrarModalItemCatalogo()">+ Nuevo ítem</button>';
    } else {
      actionsEl.innerHTML = '';
    }

    // Resaltar nav activo
    var navActiva = document.querySelector('.nav-item[data-vista="' + nombre + '"]');
    if (navActiva) navActiva.classList.add('active');

    // Cargar datos si es necesario
    if (nombre === 'clientes') {
      renderTablaClientes();
      return;
    }

    if (!enRuntimeAppsScript_()) {
      return;
    }

    if (nombre === 'dashboard') cargarDashboardPrincipal();
    if (nombre === 'lista') cargarLista();
    if (nombre === 'items') {
      refrescarCatalogoItems(function () { renderTablaItems(); }, true);
    }
    if (nombre === 'trabajadores') cargarTrabajadores();
    if (nombre === 'contratos') cargarContratos();
  }

  function cargarDashboardPrincipal() {
    mostrarLoader('Cargando dashboard principal...');

    var dataCotizaciones = [];
    var dataContratos = null;
    var pendientes = 2;
    var errores = [];

    function finalizar() {
      pendientes -= 1;
      if (pendientes > 0) return;

      ocultarLoader();
      renderDashboardPrincipal(dataCotizaciones, dataContratos || { contratos: [] }, APP.trabajadores || []);
      cargarResumenTrabajadoresDashboard_();
      if (errores.length) {
        toast('Dashboard parcial: ' + errores.join(' | '), 'error');
      }
    }

    google.script.run
      .withSuccessHandler(function (lista) {
        dataCotizaciones = lista || [];
        APP.dashboardCotizaciones = dataCotizaciones;
        finalizar();
      })
      .withFailureHandler(function (e) {
        errores.push('Cotizaciones: ' + e.message);
        finalizar();
      })
      .getCotizaciones({});

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          errores.push((res && res.error) || 'Error en contratos');
        } else {
          dataContratos = res;
          APP.dashboardContratosRes = res;
          CON.contratos = res.contratos || [];
          CON.etapas = res.etapas || [];
          CON.pagos = res.pagos || [];
          CON.cotizaciones = res.cotizaciones || [];
          if (res.clientes && res.clientes.length) APP.clientes = res.clientes;
        }
        finalizar();
      })
      .withFailureHandler(function (e) {
        errores.push('Contratos: ' + e.message);
        finalizar();
      })
      .getDashboardContratos();
  }

  function renderDashboardPrincipal(cotizaciones, contratosRes, trabajadoresRes) {
    var cotActivas = (cotizaciones || []).filter(function (c) { return c.activo !== false; });
    var valorCotizado = cotActivas.reduce(function (s, c) { return s + (parseFloat(c.total) || 0); }, 0);

    var contratos = (contratosRes && contratosRes.contratos) ? contratosRes.contratos : [];
    var contratosActivos = contratos.filter(function (c) { return c.estado === 'Activo'; });
    var saldoContratos = contratos.reduce(function (s, c) { return s + (parseFloat(c.saldo) || 0); }, 0);

    var trabajadores = trabajadoresRes || APP.trabajadores || [];
    var trabajadoresActivos = trabajadores.filter(function (t) { return t.activo !== false; });
    var itemsActivosTrab = trabajadores.reduce(function (s, t) { return s + (parseFloat(t.asignaciones_count) || 0); }, 0);
    var pagadoTrab = trabajadores.reduce(function (s, t) { return s + (parseFloat(t.total_pagado_actual) || 0); }, 0);
    var saldoTrab = trabajadores.reduce(function (s, t) { return s + (parseFloat(t.saldo_actual) || 0); }, 0);

    set('dash-kpi-cotizaciones', String(cotActivas.length));
    set('dash-kpi-valor-cotizado', fmtCOPShort(valorCotizado));
    set('dash-kpi-contratos', String(contratosActivos.length));
    set('dash-kpi-saldo-contratos', fmtCOPShort(saldoContratos));
    set('dash-kpi-trabajadores', String(trabajadoresActivos.length));
    set('dash-kpi-items-trab', String(itemsActivosTrab));
    set('dash-kpi-pagos-trab', fmtCOPShort(pagadoTrab));
    set('dash-kpi-saldo-trab', fmtCOPShort(saldoTrab));

    var porEstado = {};
    cotActivas.forEach(function (c) {
      var est = c.estado || 'Borrador';
      if (!porEstado[est]) porEstado[est] = { cantidad: 0, valor: 0 };
      porEstado[est].cantidad += 1;
      porEstado[est].valor += (parseFloat(c.total) || 0);
    });
    var estadosOrden = Object.keys(porEstado).sort(function (a, b) {
      return porEstado[b].cantidad - porEstado[a].cantidad;
    });

    var tbodyEstados = document.getElementById('dash-cot-estados-body');
    if (!estadosOrden.length) {
      tbodyEstados.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:24px;color:#666">Sin cotizaciones</td></tr>';
    } else {
      tbodyEstados.innerHTML = estadosOrden.map(function (est) {
        return '<tr>' +
          '<td>' + est + '</td>' +
          '<td style="text-align:right">' + porEstado[est].cantidad + '</td>' +
          '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:#c8f135">' + fmtCOP(porEstado[est].valor) + '</td>' +
          '</tr>';
      }).join('');
    }

    var topSaldo = contratos.slice().sort(function (a, b) {
      return (parseFloat(b.saldo) || 0) - (parseFloat(a.saldo) || 0);
    }).slice(0, 5);
    var tbodySaldo = document.getElementById('dash-contratos-saldo-body');
    if (!topSaldo.length) {
      tbodySaldo.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:24px;color:#666">Sin contratos</td></tr>';
    } else {
      tbodySaldo.innerHTML = topSaldo.map(function (c) {
        return '<tr>' +
          '<td>' + (c.consecutivo || '—') + '</td>' +
          '<td style="color:#8a8a8a">' + (c.proyecto || '—') + '</td>' +
          '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:#ffb36b">' + fmtCOP(c.saldo || 0) + '</td>' +
          '</tr>';
      }).join('');
    }

    renderGraficaAvanceContratos(contratos);
    renderGraficaProcesoTrabajadores(trabajadores);
  }

  function cargarResumenTrabajadoresDashboard_() {
    google.script.run
      .withSuccessHandler(function (lista) {
        var vistaDashboard = document.getElementById('vista-dashboard');
        if (vistaDashboard && vistaDashboard.style.display === 'none') return;
        APP.trabajadores = lista || [];
        if (APP.dashboardCotizaciones && APP.dashboardContratosRes) {
          renderDashboardPrincipal(APP.dashboardCotizaciones, APP.dashboardContratosRes, APP.trabajadores);
        }
      })
      .withFailureHandler(function () {
        // El dashboard ya se mostró con cotizaciones y contratos.
      })
      .getTrabajadores({ soloResumen: true });
  }

  function renderGraficaAvanceContratos(contratos) {
    var cont = document.getElementById('dash-chart-contratos-avance');
    if (!cont) return;

    var top = (contratos || []).slice().sort(function (a, b) {
      return (parseFloat(b.avance_pct) || 0) - (parseFloat(a.avance_pct) || 0);
    }).slice(0, 6);

    if (!top.length) {
      cont.innerHTML = '<div class="dash-empty">Sin contratos para graficar</div>';
      return;
    }

    cont.innerHTML = top.map(function (c) {
      var avance = Math.max(0, Math.min(100, parseFloat(c.avance_pct) || 0));
      var fillClass = avance < 40 ? 'danger' : (avance < 70 ? 'warn' : '');
      return '<div class="dash-bar-row">' +
        '<div class="dash-bar-label" title="' + (c.consecutivo || 'Contrato') + '">' + (c.consecutivo || 'Contrato') + '</div>' +
        '<div class="dash-bar-track"><div class="dash-bar-fill ' + fillClass + '" style="width:' + avance + '%"></div></div>' +
        '<div class="dash-bar-value">' + avance.toFixed(0) + '%</div>' +
        '</div>';
    }).join('');
  }

  function renderGraficaProcesoTrabajadores(trabajadores) {
    var cont = document.getElementById('dash-chart-trabajadores-estado');
    if (!cont) return;

    var total = (trabajadores || []).length;
    if (!total) {
      cont.innerHTML = '<div class="dash-empty">Sin trabajadores para graficar</div>';
      return;
    }

    var debe = 0;
    var alDia = 0;
    var favor = 0;
    (trabajadores || []).forEach(function (t) {
      var est = String(t.estado_saldo || '').toLowerCase();
      if (est.indexOf('debe') !== -1) debe += 1;
      else if (est.indexOf('favor') !== -1) favor += 1;
      else alDia += 1;
    });

    var filas = [
      { label: 'Al día', value: alDia, cls: '' },
      { label: 'Con saldo pendiente', value: debe, cls: 'warn' },
      { label: 'Saldo a favor', value: favor, cls: 'danger' }
    ];

    cont.innerHTML = filas.map(function (f) {
      var pct = total ? (f.value * 100 / total) : 0;
      return '<div class="dash-bar-row">' +
        '<div class="dash-bar-label">' + f.label + '</div>' +
        '<div class="dash-bar-track"><div class="dash-bar-fill ' + f.cls + '" style="width:' + pct + '%"></div></div>' +
        '<div class="dash-bar-value">' + f.value + ' (' + pct.toFixed(0) + '%)</div>' +
        '</div>';
    }).join('');
  }

  // ── TIPO DE COTIZACIÓN ──────────────────────────────────────
  function seleccionarTipo(tipo) {
    APP.tipoActual = tipo;
    document.getElementById('tipo_cotizacion').value = tipo;
    document.getElementById('btn-IVA').classList.toggle('active', tipo === 'IVA');
    document.getElementById('btn-AIU').classList.toggle('active', tipo === 'AIU');
    var cardAIU = document.getElementById('card-aiu');
    var bloqAIU = document.getElementById('bloque-aiu');
    if (tipo === 'AIU') {
      cardAIU.style.display = 'block';
      bloqAIU.style.display = 'block';
    } else {
      cardAIU.style.display = 'none';
      bloqAIU.style.display = 'none';
    }
    recalcular();
  }

  // ── CLIENTES ───────────────────────────────────────────────
  function poblarSelectClientes() {
    var sel = document.getElementById('sel_cliente');
    sel.innerHTML = '<option value="">— Seleccione cliente —</option>';
    APP.clientes.forEach(function (c) {
      var op = document.createElement('option');
      op.value = c.id;
      op.textContent = c.nombre;
      op.dataset.nit = c.nit || '';
      op.dataset.correo = c.correo || '';
      sel.appendChild(op);
    });
  }

  function cargarDatosCliente() {
    var sel = document.getElementById('sel_cliente');
    var opt = sel.options[sel.selectedIndex];
    document.getElementById('nit_cliente').value = opt.dataset.nit || '';
    document.getElementById('email_cliente').value = opt.dataset.correo || '';
  }

  // ── MODAL ÍTEM ─────────────────────────────────────────────
  function mostrarModalItem() {
    asegurarItemsCargados(function () {
      limpiarCamposModal();
      renderCatalogo('');
      abrirModal('modal-item');
      setTimeout(function () { document.getElementById('buscar_item').focus(); }, 200);
    }, null, true);
  }

  function limpiarCamposModal() {
    ['buscar_item', 'm_categoria', 'm_unidad', 'm_descripcion', 'm_cantidad', 'm_precio'].forEach(function (id) {
      document.getElementById(id).value = '';
    });
    var buscador = document.getElementById('buscar_item');
    if (buscador && buscador.dataset) buscador.dataset.selectedId = '';
    document.getElementById('modal-subtotal').textContent = '$ 0';
  }

  function filtrarCatalogo() {
    var q = document.getElementById('buscar_item').value.toLowerCase();
    renderCatalogo(q);
  }

  function renderCatalogo(q) {
    var cont = document.getElementById('catalogo-lista');
    var lista = APP.items.filter(function (item) {
      if (item.activo === false) return false;
      return !q || item.descripcion.toLowerCase().includes(q) || (item.categoria || '').toLowerCase().includes(q);
    });

    if (!lista.length) {
      cont.innerHTML = '<div class="catalogo-empty">Sin resultados para "' + q + '"</div>';
      return;
    }

    cont.innerHTML = lista.map(function (item) {
      return '<div class="catalogo-item" onclick="seleccionarDelCatalogo(' + item.id + ')">' +
        '<div class="catalogo-item-info">' +
        '<div class="catalogo-item-nombre">' + item.descripcion + '</div>' +
        '<div class="catalogo-item-meta">' + (item.categoria || '') + ' · ' + item.unidad + '</div>' +
        '</div>' +
        '<div class="catalogo-item-precio">' + fmtCOP(item.precio) + '</div>' +
        '</div>';
    }).join('');
  }

  function seleccionarDelCatalogo(idItem) {
    var item = APP.items.find(function (i) { return i.id == idItem; });
    if (!item) return;
    document.getElementById('m_categoria').value = item.categoria || '';
    document.getElementById('m_unidad').value = item.unidad || '';
    document.getElementById('m_descripcion').value = item.descripcion;
    document.getElementById('m_precio').value = item.precio || '';
    document.getElementById('m_cantidad').focus();
    calcularSubtotalModal();
    // Guardar ID del ítem seleccionado para referencia
    document.getElementById('buscar_item').dataset.selectedId = idItem;
  }

  function calcularSubtotalModal() {
    var cant = parseFloat(document.getElementById('m_cantidad').value) || 0;
    var precio = parseFloat(document.getElementById('m_precio').value) || 0;
    document.getElementById('modal-subtotal').textContent = fmtCOP(cant * precio);
  }

  function agregarItemDesdeModal() {
    var desc = document.getElementById('m_descripcion').value.trim();
    var cant = parseFloat(document.getElementById('m_cantidad').value) || 0;
    var precio = parseFloat(document.getElementById('m_precio').value) || 0;

    if (!desc) { toast('Ingresa una descripción', 'error'); return; }
    if (cant <= 0) { toast('Cantidad debe ser mayor a 0', 'error'); return; }
    if (precio <= 0) { toast('Precio debe ser mayor a 0', 'error'); return; }

    var item = {
      id_item: document.getElementById('buscar_item').dataset.selectedId || '',
      categoria: document.getElementById('m_categoria').value.trim(),
      descripcion: desc,
      unidad: document.getElementById('m_unidad').value.trim() || 'Und',
      cantidad: cant,
      precio_unitario: precio,
      subtotal: cant * precio
    };

    APP.itemsCotizacion.push(item);
    renderTablaItemsCotizacion();
    recalcular();
    cerrarModal('modal-item');
    toast('Ítem agregado', 'ok');
  }

  // ── CÁLCULO EN TIEMPO REAL ──────────────────────────────────
  function recalcular() {
    var subtotal = 0;
    APP.itemsCotizacion.forEach(function (item) { subtotal += item.subtotal; });

    var ivaPct = parseFloat((document.getElementById('iva_pct') || { value: '19' }).value) || 19;
    var tipo = APP.tipoActual;

    var adminPct = 0, imprevPct = 0, utilPct = 0;
    var vAdmin = 0, vImprev = 0, vUtil = 0;
    var baseIVA = 0, vIVA = 0, total = 0;

    if (tipo === 'AIU') {
      adminPct = parseFloat(document.getElementById('admin_pct').value) || 0;
      imprevPct = parseFloat(document.getElementById('imprev_pct').value) || 0;
      utilPct = parseFloat(document.getElementById('util_pct').value) || 0;
      vAdmin = subtotal * adminPct / 100;
      vImprev = subtotal * imprevPct / 100;
      vUtil = subtotal * utilPct / 100;
      baseIVA = vUtil;
      vIVA = baseIVA * ivaPct / 100;
      total = subtotal + vAdmin + vImprev + vUtil + vIVA;

      set('lbl-admin', 'Administración (' + adminPct + '%)');
      set('lbl-imprev', 'Imprevistos (' + imprevPct + '%)');
      set('lbl-util', 'Utilidad (' + utilPct + '%)');
      set('lbl-baseiva', 'Base IVA (Utilidad)');
      set('lbl-iva', 'IVA (' + ivaPct + '%) sobre utilidad');
      set('r-admin', fmtCOP(vAdmin));
      set('r-imprev', fmtCOP(vImprev));
      set('r-util', fmtCOP(vUtil));
      set('r-baseiva', fmtCOP(baseIVA));
    } else {
      baseIVA = subtotal;
      vIVA = baseIVA * ivaPct / 100;
      total = subtotal + vIVA;
      set('lbl-iva', 'IVA (' + ivaPct + '%)');
    }

    set('r-subtotal', fmtCOP(subtotal));
    set('r-iva', fmtCOP(vIVA));
    set('r-total', fmtCOP(total));
  }

  function set(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  // ── GUARDAR COTIZACIÓN ──────────────────────────────────────
  function guardarCotizacion() {
    // Validaciones
    var sel = document.getElementById('sel_cliente');
    if (!sel.value) { toast('Selecciona un cliente', 'error'); return; }
    if (!document.getElementById('proyecto').value.trim()) { toast('Ingresa el nombre del proyecto', 'error'); return; }
    if (!APP.itemsCotizacion.length) { toast('Agrega al menos un ítem', 'error'); return; }

    var selOpt = sel.options[sel.selectedIndex];
    var tipo = APP.tipoActual;

    var datos = {
      tipo: tipo,
      fecha: document.getElementById('fecha_cot').value,
      id_cliente: sel.value,
      nombre_cliente: selOpt.textContent,
      nit_cliente: document.getElementById('nit_cliente').value,
      email_cliente: document.getElementById('email_cliente').value,
      proyecto: document.getElementById('proyecto').value.trim(),
      direccion_obra: document.getElementById('direccion_obra').value.trim(),
      ciudad_obra: document.getElementById('ciudad_obra').value.trim(),
      validez: document.getElementById('validez').value || 30,
      observaciones: document.getElementById('observaciones').value.trim(),
      iva_pct: 19,
      admin_pct: tipo === 'AIU' ? (document.getElementById('admin_pct').value || 12) : 0,
      imprev_pct: tipo === 'AIU' ? (document.getElementById('imprev_pct').value || 3) : 0,
      util_pct: tipo === 'AIU' ? (document.getElementById('util_pct').value || 5) : 0,
      items: APP.itemsCotizacion
    };

    var esEdicion = !!APP.cotEditId;
    mostrarLoader(esEdicion ? 'Actualizando cotización...' : 'Guardando cotización...');

    var runner = google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        APP.cotEditId = null;
        APP.cotActualActiva = true;
        setBotonGuardarTexto('Guardar Cotización');
        toast('✓ ' + res.mensaje, 'ok');
        mostrarConfirmacionGuardado(res);
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error al guardar: ' + e.message, 'error');
      });

    if (esEdicion) {
      runner.actualizarCotizacion(APP.cotEditId, datos);
    } else {
      runner.guardarCotizacion(datos);
    }
  }

    if (!emailDestino) {
      toast('❌ Debes indicar un correo válido', 'error');

    }

    mostrarLoader('Enviando cotización a: ' + emailDestino);

    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        console.log('Respuesta recibida:', res);

        if (!res.ok) {
          if (maStatusEl) {
            maStatusEl.textContent = '❌ Error: ' + (res.error || 'Error desconocido');
            maStatusEl.style.color = '#e84040';
          }
          toast('Error: ' + (res.error || 'No se pudo enviar'), 'error');
          return;
        }

        if (maStatusEl) {
          maStatusEl.textContent = '✓ ' + res.mensaje;
          maStatusEl.style.color = '#c8f135';
        }
        toast(res.mensaje, 'ok');
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        console.log('ERROR en llamada RPC:', e);
        if (maStatusEl) {
          maStatusEl.textContent = '❌ Error de conexión: ' + e.message;
          maStatusEl.style.color = '#e84040';

        toast('Error de conexión: ' + e.message, 'error');

    var emailEl = document.getElementById('email_destino');
    var statusEl = document.getElementById('email-status');
    var maStatusEl = document.getElementById('ma-status');

  // ── LISTA DE COTIZACIONES ───────────────────────────────────
  var _listaCot = [];

  function cargarLista() {
    var tbody = document.getElementById('listaCotizaciones');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#666">Cargando...</td></tr>';

    google.script.run
      .withSuccessHandler(function (lista) {
        _listaCot = lista || [];
        renderLista(_listaCot);
      })
      .withFailureHandler(function (e) {
        tbody.innerHTML = '<tr><td colspan="8" style="color:#e84040;text-align:center;padding:20px">Error: ' + e.message + '</td></tr>';
      })
      .getCotizaciones({});
  }

  function renderLista(lista) {
    var tbody = document.getElementById('listaCotizaciones');
    if (!lista.length) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:32px;color:#666">Sin cotizaciones guardadas</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(function (c) {
      var inactiva = c.activo === false || c.estado === 'Inactiva';
      var estadoClass = 'badge-borrador';
      if (inactiva) estadoClass = 'badge-inactiva';
      else if (c.estado === 'Emitida' || c.estado === 'Aprobada') estadoClass = 'badge-emitida';
      var estadoTexto = inactiva ? 'Inactiva' : (c.estado || 'Borrador');
      var estado = '<span class="badge ' + estadoClass + '">' + estadoTexto + '</span>';
      var tipoBadge = c.tipo === 'AIU'
        ? '<span class="badge badge-aiu">AIU</span>'
        : '<span class="badge badge-iva">IVA</span>';
      var pdfBtn = c.pdf_url ? ('<a href="' + c.pdf_url + '" target="_blank" class="btn-link">PDF ↗</a>') : '';
      var activoStr = c.activo === false ? 'false' : 'true';
      return `
        <tr>
          <td style="font-family:'IBM Plex Mono',monospace;color:#c8f135;font-size:12px">${c.consecutivo}</td>
          <td style="color:#8a8a8a">${c.fecha}</td>
          <td>${tipoBadge}</td>
          <td>${c.nombre_cliente}</td>
          <td style="color:#8a8a8a;font-size:12px">${c.proyecto || ''}</td>
          <td style="text-align:right;font-family:'IBM Plex Mono',monospace;color:#e8e4da">${fmtCOP(c.total)}</td>
          <td>${estado}</td>
          <td>
            ${pdfBtn}
            <button class="btn-link" onclick="abrirAccionesCot('${c.id}','${c.consecutivo}','${c.total}',${activoStr},'${c.estado || ''}',${c.row_index || ''})">⋯</button>
          </td>
        </tr>`;
    }).join('');
  }

  function filtrarLista() {
    var q = document.getElementById('filtro-lista').value.toLowerCase();
    if (!q) { renderLista(_listaCot); return; }
    var filtrado = _listaCot.filter(function (c) {
      return (c.consecutivo || '').toLowerCase().includes(q) ||
        (c.nombre_cliente || '').toLowerCase().includes(q) ||
        (c.proyecto || '').toLowerCase().includes(q);
    });
    renderLista(filtrado);
  }

  function abrirAccionesCot(id, consec, total, activo, estado, rowIndex) {
    APP.cotActual = id;
    APP.cotActualConsecutivo = consec || '';
    APP.cotActualEstado = estado || 'Borrador';
    APP.cotActualRowIndex = rowIndex || '';
    APP.cotActualActiva = activo !== false && estado !== 'Inactiva';
    document.getElementById('ma-titulo').textContent = consec;
    document.getElementById('ma-info').innerHTML =
      'Total: <strong style="color:#c8f135">' + fmtCOP(total) + '</strong><br>Estado actual: <strong>' + (APP.cotActualActiva ? APP.cotActualEstado : 'Inactiva') + '</strong>';
    document.getElementById('ma-status').style.display = 'none';
    var estadoSel = document.getElementById('ma-estado');
    if (estadoSel) {
      estadoSel.value = APP.cotActualActiva ? (APP.cotActualEstado || 'Borrador') : 'Borrador';
    }
    var toggleBtn = document.getElementById('btn-toggle-cot');
    if (toggleBtn) toggleBtn.textContent = APP.cotActualActiva ? '⛔ Inhabilitar' : '↺ Reactivar';
    abrirModal('modal-acciones');

          toast('Error: ' + (res.error || ''), 'error');
          return;
        }
        APP.cotActualEstado = res.estado || nuevoEstado;
        APP.cotActualActiva = res.activo !== false;

        if (maInfo) {
          maInfo.innerHTML = maInfo.innerHTML.replace(/Estado actual:\s*<strong>.*?<\/strong>/, 'Estado actual: <strong>' + APP.cotActualEstado + '</strong>');

    event.stopPropagation();

      var isHidden = row.style.display === 'none';

  // ── APU (ANALISIS DE PRECIOS UNITARIOS) ───────────────────
  function abrirModalAPU(tipoRef, idReferencia, idItemPadre) {
    APP.apuContext = {
      tipo_ref: tipoRef,
      id_referencia: idReferencia,
      id_item_padre: idItemPadre || null
    };

    document.getElementById('apu_tipo_ref').value = tipoRef;
    document.getElementById('apu_id_ref').value = idReferencia;
    document.getElementById('apu_rendimiento').value = '1';
    document.getElementById('apu_indirecto').value = '0';
    document.getElementById('apu_utilidad').value = '0';
    document.getElementById('apu_iva').value = '19';
    document.getElementById('apu_obs').value = '';
    document.getElementById('apu_detalle_body').innerHTML = '';

    var nombreRef = '';
    var unidadRef = 'Und';
    if (tipoRef === 'ITEM') {
      var item = APP.items.find(function (i) { return String(i.id) === String(idReferencia); });
      if (item) {
        nombreRef = (item.categoria ? item.categoria + ' - ' : '') + item.descripcion;
        unidadRef = item.unidad || 'Und';
        document.getElementById('apu_iva').value = item.iva || 19;
      }
    } else {
      var itemPadre = APP.items.find(function (i) { return String(i.id) === String(idItemPadre); });
      if (itemPadre) {
        var sub = (itemPadre.subItems || []).find(function (s) { return String(s.id) === String(idReferencia); });
        if (sub) {
          nombreRef = sub.nombre + ' (Sub de ' + itemPadre.descripcion + ')';
          unidadRef = sub.unidad || 'Und';
          document.getElementById('apu_iva').value = sub.iva || 19;
        }
      }
    }

    document.getElementById('apu_ref_nombre').textContent = nombreRef || 'Referencia';
    document.getElementById('apu_ref_unidad').textContent = unidadRef;

    mostrarLoader('Cargando APU...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) {
          toast('Error: ' + (res.error || ''), 'error');
          return;
        }

        if (res.apu) {
          document.getElementById('apu_rendimiento').value = res.apu.rendimiento || 1;
          document.getElementById('apu_indirecto').value = res.apu.indirecto_pct || 0;
          document.getElementById('apu_utilidad').value = res.apu.utilidad_pct || 0;
          document.getElementById('apu_iva').value = res.apu.iva_pct || document.getElementById('apu_iva').value;
          document.getElementById('apu_obs').value = res.apu.observaciones || '';
          document.getElementById('apu_ref_nombre').textContent = res.apu.nombre_referencia || document.getElementById('apu_ref_nombre').textContent;
          document.getElementById('apu_ref_unidad').textContent = res.apu.unidad || document.getElementById('apu_ref_unidad').textContent;
        }

        var detalles = res.detalles && res.detalles.length ? res.detalles : [];
        if (!detalles.length) {
          agregarFilaApuDetalle();
        } else {
          renderApuDetalle(detalles);
        }

        recalcularApuUI();
        abrirModal('modal-apu');
      })
      .withFailureHandler(function (err) {
        ocultarLoader();
        toast('Error cargando APU: ' + err.toString(), 'error');
      })
      .getAPU(tipoRef, idReferencia);
  }

  function construirFilaApu_(tipo, descripcion, unidad, cantidad, precio) {
    return '<tr>' +
      '<td><select class="input-field apu-tipo" style="height:30px"><option ' + (tipo === 'Material' ? 'selected' : '') + '>Material</option><option ' + (tipo === 'Mano de Obra' ? 'selected' : '') + '>Mano de Obra</option><option ' + (tipo === 'Equipo' ? 'selected' : '') + '>Equipo</option><option ' + (tipo === 'Transporte' ? 'selected' : '') + '>Transporte</option><option ' + (tipo === 'Otro' ? 'selected' : '') + '>Otro</option></select></td>' +
      '<td><input type="text" class="input-field apu-desc" style="height:30px" value="' + (descripcion || '') + '"></td>' +
      '<td><input type="text" class="input-field apu-und" style="height:30px;width:70px" value="' + (unidad || 'Und') + '"></td>' +
      '<td><input type="number" class="input-field apu-cant" style="height:30px;width:90px" step="0.01" value="' + (cantidad || 0) + '" oninput="recalcularApuUI()"></td>' +
      '<td><input type="number" class="input-field apu-precio" style="height:30px;width:110px" step="100" value="' + (precio || 0) + '" oninput="recalcularApuUI()"></td>' +
      '<td class="apu-subtotal" style="text-align:right;font-family:\'IBM Plex Mono\',monospace">$ 0</td>' +
      '<td><button class="btn-link" onclick="eliminarFilaApuDetalle(this)">×</button></td>' +

  function agregarFilaApuDetalle() {
    var tbody = document.getElementById('apu_detalle_body');
    tbody.insertAdjacentHTML('beforeend', construirFilaApu_('Material', '', 'Und', 0, 0));
    recalcularApuUI();
  }

  function eliminarFilaApuDetalle(btn) {
    var tr = btn.closest('tr');
    if (tr) tr.remove();
    if (!document.querySelector('#apu_detalle_body tr')) {
      agregarFilaApuDetalle();
      return;
    }
    recalcularApuUI();
  }

  function leerDetalleApuUI() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#apu_detalle_body tr'));
    return rows.map(function (row) {
      var cant = parseFloat(row.querySelector('.apu-cant').value) || 0;
      var precio = parseFloat(row.querySelector('.apu-precio').value) || 0;
      return {
        tipo_recurso: row.querySelector('.apu-tipo').value,
        descripcion: (row.querySelector('.apu-desc').value || '').trim(),
        unidad: (row.querySelector('.apu-und').value || 'Und').trim(),
        cantidad: cant,
        precio_unitario: precio,
        subtotal: cant * precio
      };
    }).filter(function (d) {
      return d.descripcion.length > 0;
    });
  }

  function recalcularApuUI() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#apu_detalle_body tr'));
    var detalles = [];

    rows.forEach(function (row) {
      var cant = parseFloat(row.querySelector('.apu-cant').value) || 0;
      var precio = parseFloat(row.querySelector('.apu-precio').value) || 0;
      var subtotal = cant * precio;
      row.querySelector('.apu-subtotal').textContent = fmtCOP(subtotal);
      detalles.push({ cantidad: cant, precio_unitario: precio, subtotal: subtotal });
    });

    var rendimiento = parseFloat(document.getElementById('apu_rendimiento').value) || 1;
    if (rendimiento <= 0) rendimiento = 1;
    var indirectoPct = parseFloat(document.getElementById('apu_indirecto').value) || 0;
    var utilidadPct = parseFloat(document.getElementById('apu_utilidad').value) || 0;
    var ivaPct = parseFloat(document.getElementById('apu_iva').value) || 0;

    var costoDirecto = detalles.reduce(function (s, d) { return s + d.subtotal; }, 0);
    var costoDirectoUnit = costoDirecto / rendimiento;
    var indirectos = costoDirectoUnit * (indirectoPct / 100);
    var utilidad = (costoDirectoUnit + indirectos) * (utilidadPct / 100);
    var base = costoDirectoUnit + indirectos + utilidad;
    var iva = base * (ivaPct / 100);
    var total = base + iva;

    document.getElementById('apu_sum_directo').textContent = fmtCOP(costoDirecto);
    document.getElementById('apu_sum_directo_unit').textContent = fmtCOP(costoDirectoUnit);
    document.getElementById('apu_sum_indirectos').textContent = fmtCOP(indirectos);
    document.getElementById('apu_sum_utilidad').textContent = fmtCOP(utilidad);
    document.getElementById('apu_sum_iva').textContent = fmtCOP(iva);
    document.getElementById('apu_sum_total').textContent = fmtCOP(total);
  }

  function estadoSaldoTrabajadorBadge(resumen) {
    var saldo = parseFloat(resumen.saldo_actual) || 0;
    var cls = saldo > 0 ? 'badge-debe' : saldo < 0 ? 'badge-favor' : 'badge-emitida';
    var texto = saldo > 0 ? 'Debe' : saldo < 0 ? 'Saldo a favor' : 'Al día';
    return '<span class="badge ' + cls + '">' + texto + '</span>';
  }

  function badgeTipoTrabajador(tipo) {
    var tipoNorm = (tipo || 'Empleado');
    var cls = tipoNorm === 'Proveedor' ? 'badge-proveedor' : 'badge-empleado';
    return '<span class="badge ' + cls + '">' + tipoNorm + '</span>';
  }

  function renderTablaTrabajadores(lista) {
    var tbody = document.getElementById('listaTrabajadores');
    var data = lista || APP.trabajadores;
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:#666">Sin trabajadores registrados</td></tr>';
      return;
    }
    var selected = APP.trabajadorActual;
    tbody.innerHTML = data.map(function (t) {
      var isSelected = String(selected) === String(t.id);
      var activoStr = t.activo === false ? 'false' : 'true';
      return `
        <tr class="trab-row${isSelected ? ' trab-row-selected' : ''}" onclick="seleccionarTrabajador('${t.id}')">
          <td style="padding:12px 14px"><strong>${t.nombre || '—'}</strong></td>
          <td style="padding:12px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dust)">${t.documento || '—'}</td>
          <td style="padding:12px 14px">${badgeTipoTrabajador(t.tipo)}</td>
          <td style="padding:12px 14px;color:var(--dust)">${t.cargo || '—'}</td>
          <td style="padding:12px 14px">
            <button class="btn-link" onclick="event.stopPropagation();mostrarModalTrabajador('${t.id}')">Editar</button>
            <button class="btn-link" onclick="event.stopPropagation();toggleEstadoTrabajador('${t.id}',${activoStr})">${t.activo === false ? 'Act.' : 'Inact.'}</button>
          </td>
        </tr>`;
    }).join('');
    var countEl = document.getElementById('trab-count');
    if (countEl) countEl.textContent = '(' + data.length + ')';
  }

  function filtrarTrabajadores() {
    var qEl = document.getElementById('filtro-trabajadores');
    var tipoEl = document.getElementById('filtro-tipo-trabajador');
    var q = qEl ? qEl.value.toLowerCase().trim() : '';
    var tipo = tipoEl ? tipoEl.value : '';
    if (!q && !tipo) {
      renderTablaTrabajadores(APP.trabajadores);
      return;
    }
    var filtrado = APP.trabajadores.filter(function (t) {
      var coincideTexto = !q ||
        (t.nombre || '').toLowerCase().includes(q) ||
        (t.documento || '').toLowerCase().includes(q) ||
        (t.cargo || '').toLowerCase().includes(q) ||
        (t.especialidad || '').toLowerCase().includes(q);
      var coincideTipo = !tipo || (t.tipo || 'Empleado') === tipo;
      return coincideTexto && coincideTipo;
    });
    renderTablaTrabajadores(filtrado);
  }

  function seleccionarTrabajador(idTrabajador) {
    APP.trabajadorActual = idTrabajador;
    filtrarTrabajadores();
    cargarDetalleTrabajador(idTrabajador);
  }

  function togglePanelTrabajadores() {
    var layout = document.getElementById('trab-layout');
    var panelLeft = document.getElementById('trab-panel-left');
    if (!layout || !panelLeft) return;
    layout.classList.toggle('con-layout-collapsed');
    panelLeft.classList.toggle('con-panel-hidden');
    syncPanelTrabajadoresState();
  }

  function syncPanelTrabajadoresState() {
    var layout = document.getElementById('trab-layout');
    var btn = document.getElementById('btn-toggle-panel');
    var reopen = document.getElementById('trab-panel-reopen');
    var collapsed = layout && layout.classList.contains('con-layout-collapsed');
    if (btn) btn.textContent = collapsed ? '▌' : '▮▮';
    if (reopen) reopen.style.display = collapsed ? 'block' : 'none';
  }

  function cargarTrabajadores() {
    mostrarLoader('Cargando trabajadores...');
    if (window.google && google.script && google.script.run) {
      google.script.run.withFailureHandler(function () { }).invalidarCacheTrabajadores_();
    }
    google.script.run
      .withSuccessHandler(function (lista) {
        ocultarLoader();
        syncPanelTrabajadoresState();
        APP.trabajadores = lista || [];
        var countEl = document.getElementById('trab-count');
        if (countEl) countEl.textContent = '(' + APP.trabajadores.length + ')';
        filtrarTrabajadores();
        if (APP.trabajadorActual && APP.trabajadores.some(function (t) { return String(t.id) === String(APP.trabajadorActual); })) {
          cargarDetalleTrabajador(APP.trabajadorActual);
        } else if (APP.trabajadores.length) {
          seleccionarTrabajador(APP.trabajadores[0].id);
        } else {
          APP.trabajadorActual = null;
          APP.trabajadorDetalle = null;
          document.getElementById('trab-detalle-empty').style.display = 'flex';
          document.getElementById('trab-detalle').style.display = 'none';
        }
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error cargando trabajadores: ' + e.message, 'error');
      })
      .getTrabajadores();
  }

  function cargarDetalleTrabajador(idTrabajador) {
    mostrarLoader('Cargando detalle del trabajador...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        APP.trabajadorActual = idTrabajador;
        APP.trabajadorDetalle = res;
        filtrarTrabajadores();
        renderDetalleTrabajador(res);
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error de conexión: ' + e.message, 'error');
      })
      .getDetalleTrabajador(idTrabajador);
  }

  function renderDetalleTrabajador(res) {
    var trabajador = res.trabajador || {};
    var resumen = res.resumen || {};
    var asignaciones = res.asignaciones || [];
    var pagos = res.pagos || [];

    document.getElementById('trab-detalle-empty').style.display = 'none';
    document.getElementById('trab-detalle').style.display = 'block';

    var tipoTxt = trabajador.tipo || 'Empleado';
    document.getElementById('trd-cargo').textContent = tipoTxt + ' · ' + (trabajador.cargo || '—');
    document.getElementById('trd-nombre').textContent = trabajador.nombre_completo || trabajador.nombre || '—';
    document.getElementById('trd-documento').textContent = (trabajador.cedula || trabajador.documento || '—') + ' · ' + (trabajador.telefono || 'sin teléfono');
    document.getElementById('trd-especialidad').textContent = trabajador.especialidad ? ('Especialidad: ' + trabajador.especialidad) : 'Sin especialidad registrada';
    var transferencia = [];
    if (trabajador.banco) transferencia.push('Banco: ' + trabajador.banco);
    if (trabajador.tipo_cuenta) transferencia.push('Cuenta: ' + trabajador.tipo_cuenta);
    if (trabajador.numero_cuenta) transferencia.push('N. cuenta: ' + trabajador.numero_cuenta);
    document.getElementById('trd-transferencia').textContent = transferencia.length ? transferencia.join(' · ') : 'Sin datos de transferencia';
    document.getElementById('trd-contrato').innerHTML = resumen.contrato_actual_consecutivo ?
      'Contrato actual: <strong>' + resumen.contrato_actual_consecutivo + '</strong><br>' +
      (resumen.item_actual_descripcion ? ('Item: ' + resumen.item_actual_descripcion) : (resumen.contrato_actual_proyecto || '')) :
      'Sin item activo asignado';
    document.getElementById('trd-estado-badge').innerHTML = estadoSaldoTrabajadorBadge(resumen);

    document.getElementById('trd-acordado').textContent = fmtCOP(resumen.valor_acordado_actual || 0);
    document.getElementById('trd-pagado').textContent = fmtCOP(resumen.total_pagado_actual || 0);
    document.getElementById('trd-saldo').textContent = fmtCOP(resumen.saldo_actual || 0);
    document.getElementById('trd-estado-saldo').innerHTML = estadoSaldoTrabajadorBadge(resumen);
    document.getElementById('trd-note').textContent = resumen.saldo_actual > 0 ?
      'Hay ' + fmtCOP(resumen.saldo_actual) + ' pendiente por pagar en todos los items.' :
      (resumen.saldo_actual < 0 ? 'Existe un saldo a favor de ' + fmtCOP(Math.abs(resumen.saldo_actual)) + ' en todos los items.' : 'No hay saldo pendiente.');

    renderAsignacionesTrabajador(asignaciones, pagos, resumen);
    renderPagosTrabajador(pagos);
  }

  function renderAsignacionesTrabajador(lista, pagos, resumen) {
    var tbody = document.getElementById('trab-asignaciones-body');
    if (!lista || !lista.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#555">Sin asignaciones</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(function (a) {
      var totalPagado = pagos.reduce(function (sum, p) {
        if (String(p.id_asignacion) === String(a.id)) return sum + (parseFloat(p.valor) || 0);
        return sum;
      }, 0);
      var saldo = (parseFloat(a.valor_acordado) || 0) - totalPagado;
      var estado = a.estado || (a.activo ? 'Activa' : 'Cerrada');
      var cls = (estado === 'Activa' && a.activo !== false) ? 'badge-emitida' : 'badge-inactiva';
      var itemInfo = a.descripcion_item || a.proyecto_contrato || '—';
      return '<tr>' +
        '<td>' + (a.consecutivo_contrato || '—') + '</td>' +
        '<td style="color:#8a8a8a;font-size:12px">' + itemInfo + '</td>' +
        '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:#c8f135">' + fmtCOP(a.valor_acordado || 0) + '</td>' +
        '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:#8a8a8a">' + fmtCOP(totalPagado) + '</td>' +
        '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:' + (saldo > 0 ? '#ff8a80' : '#81c784') + '">' + fmtCOP(saldo) + '</td>' +
        '<td><span class="badge ' + cls + '">' + estado + '</span></td>' +
        '<td style="white-space:nowrap">' +
        '<button class="btn-link" onclick="event.stopPropagation();editarAsignacionTrabajador(\'' + a.id + '\')">Editar</button> ' +
        '<button class="btn-link" onclick="event.stopPropagation();eliminarAsignacionTrabajadorUI(\'' + a.id + '\')">Eliminar</button>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  function renderPagosTrabajador(lista) {
    var tbody = document.getElementById('trab-pagos-body');
    if (!lista || !lista.length) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#555">Sin pagos registrados</td></tr>';
      return;
    }
    tbody.innerHTML = lista.map(function (p) {
      return '<tr>' +
        '<td style="color:#8a8a8a">' + (p.fecha_pago || '—') + '</td>' +
        '<td style="color:#8a8a8a;font-size:12px">' + (p.consecutivo_contrato || '—') + '</td>' +
        '<td style="color:#8a8a8a">' + (p.referencia || '—') + '</td>' +
        '<td style="color:#8a8a8a">' + (p.metodo || '—') + '</td>' +
        '<td style="text-align:right;font-family:\'IBM Plex Mono\',monospace;color:#c8f135">' + fmtCOP(p.valor || 0) + '</td>' +
        '<td style="color:#8a8a8a;font-size:12px">' + (p.observaciones || '—') + '</td>' +
        '<td style="white-space:nowrap">' +
        '<button class="btn-link" onclick="event.stopPropagation();editarPagoTrabajador(\'' + p.id + '\')">Editar</button> ' +
        '<button class="btn-link" onclick="event.stopPropagation();eliminarPagoTrabajadorUI(\'' + p.id + '\')">Eliminar</button>' +
        '</td>' +
        '</tr>';
    }).join('');
  }

  function cargarContratosTrabajador(callback) {
    google.script.run
      .withSuccessHandler(function (lista) {
        APP.contratosTrabajador = lista || [];
        if (callback) callback(APP.contratosTrabajador);
      })
      .withFailureHandler(function (e) {
        toast('Error cargando contratos: ' + e.message, 'error');
        if (callback) callback([]);
      })
      .getContratosParaTrabajadores();
  }

  function mostrarModalAsignacionTrabajador() {
    if (!APP.trabajadorActual) { toast('Selecciona un trabajador', 'error'); return; }
    var detalle = APP.trabajadorDetalle && APP.trabajadorDetalle.trabajador ? APP.trabajadorDetalle : null;
    var trabajador = detalle ? detalle.trabajador : APP.trabajadores.find(function (t) { return String(t.id) === String(APP.trabajadorActual); });
    document.getElementById('ta_trabajador_id').value = APP.trabajadorActual;
    document.getElementById('ta_trabajador_nombre').textContent = trabajador ? trabajador.nombre : '—';
    APP.asignacionEditId = null;
    document.getElementById('ta_titulo').textContent = 'Asignar item de contrato';
    document.getElementById('ta_asignacion_id').value = '';
    document.getElementById('ta_valor').value = '';
    document.getElementById('ta_inicio').value = new Date().toISOString().split('T')[0];
    document.getElementById('ta_fin').value = '';
    document.getElementById('ta_estado').value = 'Activa';
    document.getElementById('ta_obs').value = '';
    APP.itemsContratoAsignacion = [];

    cargarContratosTrabajador(function (lista) {
      var sel = document.getElementById('ta_contrato');
      var selItem = document.getElementById('ta_item');
      sel.innerHTML = '';
      if (selItem) selItem.innerHTML = '<option value="">— Selecciona un contrato primero —</option>';
      if (!lista.length) {
        sel.innerHTML = '<option value="">— No hay contratos disponibles —</option>';
      } else {
        sel.innerHTML = '<option value="">— Seleccione —</option>';
        lista.forEach(function (c) {
          var op = document.createElement('option');
          op.value = c.id;
          op.textContent = c.consecutivo + ' · ' + c.proyecto + ' · ' + fmtCOP(c.valor_total || 0);
          op.dataset.consecutivo = c.consecutivo;
          op.dataset.proyecto = c.proyecto || '';
          sel.appendChild(op);
        });
      }
      abrirModal('modal-asignacion-trabajador');
    });
  }

  function cargarItemsContratoAsignacion(callback) {
    var selContrato = document.getElementById('ta_contrato');
    var selItem = document.getElementById('ta_item');
    if (!selItem) return;

    APP.itemsContratoAsignacion = [];
    selItem.innerHTML = '<option value="">— Cargando items... —</option>';
    document.getElementById('ta_valor').value = '';

    if (!selContrato || !selContrato.value) {
      selItem.innerHTML = '<option value="">— Selecciona un contrato primero —</option>';
      return;
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (!res || !res.ok) {
          selItem.innerHTML = '<option value="">— Sin items disponibles —</option>';
          toast((res && res.error) || 'No fue posible cargar los items', 'error');
          return;
        }

        var items = res.items || [];
        APP.itemsContratoAsignacion = items;
        if (!items.length) {
          selItem.innerHTML = '<option value="">— Este contrato no tiene items —</option>';
          return;
        }

        selItem.innerHTML = '<option value="">— Seleccione item —</option>';
        items.forEach(function (it) {
          var op = document.createElement('option');
          op.value = it.id_detalle;
          op.textContent = (it.descripcion || 'Item') + ' · ' + fmtCOP(it.subtotal || 0);
          op.dataset.idItemCatalogo = it.id_item_catalogo || '';
          op.dataset.descripcion = it.descripcion || '';
          op.dataset.unidad = it.unidad || '';
          op.dataset.cantidad = String(it.cantidad || 0);
          op.dataset.subtotal = String(it.subtotal || 0);
          selItem.appendChild(op);
        });
        if (callback) callback();
      })
      .withFailureHandler(function (e) {
        selItem.innerHTML = '<option value="">— Sin items disponibles —</option>';
        toast('Error cargando items: ' + e.message, 'error');
        if (callback) callback();
      })
      .getItemsContratoParaTrabajadores(selContrato.value);
  }

  function editarAsignacionTrabajador(idAsignacion) {
    if (!APP.trabajadorDetalle || !APP.trabajadorDetalle.asignaciones) return;
    var asignacion = APP.trabajadorDetalle.asignaciones.find(function (a) { return String(a.id) === String(idAsignacion); });
    if (!asignacion) { toast('Asignación no encontrada', 'error'); return; }

    APP.asignacionEditId = asignacion.id;
    document.getElementById('ta_titulo').textContent = 'Editar item asignado';
    document.getElementById('ta_trabajador_id').value = APP.trabajadorActual;
    document.getElementById('ta_asignacion_id').value = asignacion.id;
    document.getElementById('ta_trabajador_nombre').textContent = APP.trabajadorDetalle.trabajador ? APP.trabajadorDetalle.trabajador.nombre : '—';
    document.getElementById('ta_valor').value = asignacion.valor_acordado || '';
    document.getElementById('ta_inicio').value = asignacion.fecha_inicio || new Date().toISOString().split('T')[0];
    document.getElementById('ta_fin').value = asignacion.fecha_fin || '';
    document.getElementById('ta_estado').value = asignacion.estado || 'Activa';
    document.getElementById('ta_obs').value = asignacion.observaciones || '';

    cargarContratosTrabajador(function (lista) {
      var sel = document.getElementById('ta_contrato');
      var selItem = document.getElementById('ta_item');
      sel.innerHTML = '<option value="">— Seleccione —</option>';
      lista.forEach(function (c) {
        var op = document.createElement('option');
        op.value = c.id;
        op.textContent = c.consecutivo + ' · ' + c.proyecto + ' · ' + fmtCOP(c.valor_total || 0);
        op.dataset.consecutivo = c.consecutivo;
        op.dataset.proyecto = c.proyecto || '';
        sel.appendChild(op);
      });
      sel.value = asignacion.id_contrato || '';
      cargarItemsContratoAsignacion(function () {
        if (selItem) selItem.value = asignacion.id_detalle_item || '';
        autocompletarValorItemAsignacion();
        abrirModal('modal-asignacion-trabajador');
      });
    });
  }

  function autocompletarValorItemAsignacion() {
    var selItem = document.getElementById('ta_item');
    var valorEl = document.getElementById('ta_valor');
    if (!selItem || !valorEl) return;
    if (!selItem.value || selItem.selectedIndex < 0) {
      valorEl.value = '';
      return;
    }
    var opt = selItem.options[selItem.selectedIndex];
    var subtotal = parseFloat(opt.dataset.subtotal || '0') || 0;
    if (subtotal > 0) valorEl.value = subtotal;
  }

  function guardarAsignacionTrabajadorModal() {
    var idTrabajador = document.getElementById('ta_trabajador_id').value;
    var sel = document.getElementById('ta_contrato');
    var selItem = document.getElementById('ta_item');
    if (!idTrabajador) { toast('Selecciona un trabajador', 'error'); return; }
    if (!sel.value) { toast('Selecciona un contrato', 'error'); return; }
    if (!selItem || !selItem.value) { toast('Selecciona un item del contrato', 'error'); return; }

    var itemOpt = selItem.options[selItem.selectedIndex];

    var datos = {
      id_asignacion: APP.asignacionEditId || '',
      id_trabajador: idTrabajador,
      id_contrato: sel.value,
      consecutivo_contrato: sel.options[sel.selectedIndex].dataset.consecutivo || '',
      proyecto_contrato: sel.options[sel.selectedIndex].dataset.proyecto || '',
      id_detalle_item: selItem.value,
      id_item_catalogo: itemOpt.dataset.idItemCatalogo || '',
      descripcion_item: itemOpt.dataset.descripcion || '',
      unidad_item: itemOpt.dataset.unidad || '',
      cantidad_item: itemOpt.dataset.cantidad || 0,
      valor_acordado: document.getElementById('ta_valor').value || 0,
      fecha_inicio: document.getElementById('ta_inicio').value,
      fecha_fin: document.getElementById('ta_fin').value,
      estado: document.getElementById('ta_estado').value || 'Activa',
      observaciones: document.getElementById('ta_obs').value.trim()
    };

    mostrarLoader('Asignando item...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        cerrarModal('modal-asignacion-trabajador');
        APP.asignacionEditId = null;
        toast('✓ ' + res.mensaje, 'ok');
        cargarDetalleTrabajador(idTrabajador);
        cargarTrabajadores();
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error: ' + e.message, 'error');
      })
    [APP.asignacionEditId ? 'actualizarAsignacionTrabajador' : 'asignarTrabajadorContrato'](datos);
  }

  function eliminarAsignacionTrabajadorUI(idAsignacion) {
    if (!confirm('¿Eliminar este item asignado?')) return;
    mostrarLoader('Eliminando item...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        toast('✓ ' + res.mensaje, 'ok');
        cargarDetalleTrabajador(APP.trabajadorActual);
        cargarTrabajadores();
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error: ' + e.message, 'error');
      })
      .eliminarAsignacionTrabajador(idAsignacion);
  }

  function mostrarModalPagoTrabajador(idPago) {
    if (!APP.trabajadorActual) { toast('Selecciona un trabajador', 'error'); return; }
    var detalle = APP.trabajadorDetalle;
    if (!detalle || !detalle.asignaciones || !detalle.asignaciones.length) {
      toast('Primero asigna un item activo al trabajador', 'error');
      return;
    }

    APP.pagoEditId = null;
    document.getElementById('tp_trabajador_id').value = APP.trabajadorActual;
    document.getElementById('tp_pago_id').value = '';
    document.getElementById('tp_contrato_info').textContent = (detalle.resumen.contrato_actual_consecutivo || '—') + ' · ' + (detalle.resumen.item_actual_descripcion || detalle.resumen.contrato_actual_proyecto || '');
    document.getElementById('tp_titulo').textContent = 'Registrar pago';
    document.getElementById('tp_valor').value = '';
    document.getElementById('tp_fecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('tp_metodo').value = 'Transferencia';
    document.getElementById('tp_ref').value = '';
    document.getElementById('tp_obs').value = '';

    var selAsignacion = document.getElementById('tp_asignacion_id');
    selAsignacion.innerHTML = '<option value="">— Seleccione —</option>';
    detalle.asignaciones.forEach(function (a) {
      var op = document.createElement('option');
      op.value = a.id;
      op.textContent = (a.consecutivo_contrato || '—') + ' · ' + (a.descripcion_item || a.proyecto_contrato || 'Item');
      if (String(a.id) === String(detalle.resumen.asignacion_actual_id)) op.selected = true;
      selAsignacion.appendChild(op);
    });

    if (idPago) {
      var pago = (detalle.pagos || []).find(function (p) { return String(p.id) === String(idPago); });
      if (!pago) { toast('Pago no encontrado', 'error'); return; }
      APP.pagoEditId = pago.id;
      document.getElementById('tp_titulo').textContent = 'Editar pago';

  function parseLineasControlQuincenal(texto) {
    if (!texto) return [];
    return texto
      .split(/\r?\n/)
      .map(function (l) { return l.trim(); })
      .filter(Boolean)
      .map(function (linea) {
        var partes = linea.split('|');
        if (partes.length < 2) return null;
        var concepto = partes[0].trim();
        var valorTxt = partes.slice(1).join('|').trim();
        var clean = valorTxt.replace(/\./g, '').replace(/,/g, '.').replace(/[^0-9.-]/g, '');
        var valor = parseFloat(clean) || 0;
        if (!concepto) return null;
        return { concepto: concepto, valor: valor };
      })
      .filter(Boolean);
  }

  function generarSoporteQuincenalTrabajador() {
    var idTrabajador = document.getElementById('ts_trabajador_id').value;
    var fechaInicio = document.getElementById('ts_fecha_inicio').value;
    var fechaFin = document.getElementById('ts_fecha_fin').value;
    if (!idTrabajador) { toast('Selecciona un trabajador', 'error'); return; }
    if (!fechaInicio || !fechaFin) { toast('Selecciona el rango de fechas', 'error'); return; }

    var descuentos = parseLineasControlQuincenal(document.getElementById('ts_descuentos').value);
    var deudas = parseLineasControlQuincenal(document.getElementById('ts_deudas').value);

    var reportWindow = window.open('', '_blank');
    if (!reportWindow) {
      toast('Permite ventanas emergentes para generar el soporte', 'error');
      return;
    }
    reportWindow.document.write('<html><body style="font-family:Arial;padding:24px">Generando soporte...</body></html>');
    reportWindow.document.close();

    mostrarLoader('Generando soporte quincenal...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res || !res.ok) {
          reportWindow.close();
          toast('Error: ' + ((res && res.error) || 'No se pudo generar el soporte'), 'error');
          return;
        }
        reportWindow.document.open();
        reportWindow.document.write(res.html || '');
        reportWindow.document.close();
        cerrarModal('modal-soporte-trabajador');
        toast('Soporte generado · Corte #' + (res.id_corte || 'N/A'), 'ok');
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        reportWindow.close();
        toast('Error: ' + e.message, 'error');
      })
      .getSoporteQuincenalTrabajador({
        id_trabajador: idTrabajador,
        fecha_inicio: fechaInicio,
        fecha_fin: fechaFin,
        descuentos: descuentos,
        deudas: deudas
      });
  }

  function renderKPIs() {
    var activos = CON.contratos.filter(function (c) { return c.estado === 'Activo'; });
    var valorTotal = activos.reduce(function (s, c) { return s + (c.valor_total || 0); }, 0);
    var cobrado = CON.contratos.reduce(function (s, c) { return s + (c.total_pagado || 0); }, 0);
    var saldo = CON.contratos.reduce(function (s, c) { return s + (c.saldo || 0); }, 0);

    document.getElementById('kpi-activos-val').textContent = activos.length;
    document.getElementById('kpi-valor-val').textContent = fmtCOPShort(valorTotal);
    document.getElementById('kpi-cobrado-val').textContent = fmtCOPShort(cobrado);
    document.getElementById('kpi-saldo-val').textContent = fmtCOPShort(saldo);
  }

  function fmtCOPShort(n) {
    n = Math.round(n);
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
    return '$' + n.toLocaleString('es-CO');
  }

  function renderListaContratos() {
    var cont = document.getElementById('con-lista');
    if (!CON.contratos.length) {
      cont.innerHTML = '<div style="text-align:center;padding:40px;color:#555;font-size:12px">Sin contratos — crea el primero</div>';
      return;
    }
    cont.innerHTML = CON.contratos.map(function (c) {
      var avance = c.avance_pct || 0;
      var est = estadoBadgeSmall(c.estado);
      var actCls = (CON.activo && String(CON.activo) === String(c.id)) ? ' selected' : '';
      return `
        <div class="con-lista-item${actCls}" onclick="seleccionarContrato('${c.id}')">
          <div class="con-item-consec">${c.consecutivo}</div>
          <div class="con-item-proyecto">${c.proyecto}</div>
          <div class="con-item-cliente">${c.nombre_cliente}</div>
          <div class="con-item-mini-bar"><div class="con-item-mini-fill" style="width:${avance}%"></div></div>
          <div class="con-item-bottom">
            <span class="con-item-valor">${avance}% · ${fmtCOPShort(c.valor_total)}</span>
            ${est}
          </div>
        </div>`;
    }).join('');
  }

  function estadoBadgeSmall(estado) {
    var cls = estado === 'Activo' ? 'badge-emitida' : estado === 'Finalizado' ? 'badge-iva' : 'badge-borrador';
    return '<span class="badge ' + cls + '">' + estado + '</span>';
  }

  function seleccionarContrato(id) {

    document.getElementById('con-detalle-empty').style.display = 'none';

      (c.fecha_fin_real ? '<br>Fin real: ' + c.fecha_fin_real : '');
    document.getElementById('d-estado-badge').innerHTML = estadoBadgeSmall(c.estado);

    var avance = c.avance_pct || 0;
    document.getElementById('d-avance-pct').textContent = avance + '%';

    document.getElementById('d-saldo').textContent = fmtCOP(c.saldo);

  // ── ETAPAS ────────────────────────────────────────────────────
  function renderEtapas() {
    var etapas = CON.etapas.filter(function (e) { return String(e.id_contrato) === String(CON.activo); });
    var cont = document.getElementById('con-etapas-body');
    if (!etapas.length) {
      cont.innerHTML = '<div style="text-align:center;padding:32px;color:#555;font-size:12px">Sin etapas — agrega la primera</div>';
      return;
    }

    var html = '';
    etapas.forEach(function (et) {
      var pillCls = et.estado === 'Completada' ? 'pill-completada' : et.estado === 'En curso' ? 'pill-en-curso' : 'pill-pendiente';
      var barColor = et.estado === 'Completada' ? '#4caf50' : et.estado === 'En curso' ? '#f5a623' : '#2e2e2e';
      var barW = et.estado === 'Completada' ? 100 : et.estado === 'En curso' ? 50 : 0;
      var fechas = '';
      if (et.fecha_ini_plan) fechas += 'Plan: ' + et.fecha_ini_plan + ' → ' + (et.fecha_fin_plan || '?');
      if (et.fecha_ini_real) fechas += (fechas ? ' · ' : '') + 'Real: ' + et.fecha_ini_real + (et.fecha_fin_real ? ' → ' + et.fecha_fin_real : '…');

      var hasSubEtapas = et.subEtapas && et.subEtapas.length > 0;
      var toggleIcon = hasSubEtapas ? '▼' : '▶';

      // Etapa principal
      html += `
        <div class="etapa-row">
          <div style="display:flex;align-items:center;width:100%;gap:8px">
            ${hasSubEtapas ? '<button class="toggle-btn" onclick="toggleSubEtapas(\'' + et.id + '\', event)" style="min-width:24px;cursor:pointer;border:none;background:none;font-size:14px;padding:0">' + toggleIcon + '</button>' : '<div style="width:24px"></div>'}
            <div style="flex:1;cursor:pointer" onclick="abrirEditarEtapa(\'${et.id}\')">
              <div class="etapa-nombre">${et.nombre}</div>
              ${et.descripcion ? '<div class="etapa-meta">' + et.descripcion + '</div>' : ''}
              ${fechas ? '<div class="etapa-meta" style="margin-top:2px">' + fechas + '</div>' : ''}
              <div class="etapa-bar-wrap">
                <div class="etapa-mini-track"><div class="etapa-mini-fill" style="width:${barW}%;background:${barColor}"></div></div>
                <span class="etapa-peso">${et.peso_pct}%</span>
              </div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
            <span class="etapa-pill ${pillCls}">${et.estado}</span>
            ${hasSubEtapas ? '<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();mostrarModalNuevaSubEtapa(\'' + et.id + '\')">+ Sub</button>' : ''}
            <button class="item-del-btn" title="Editar etapa" onclick="event.stopPropagation();abrirEditarEtapa('${et.id}')">✎</button>
            <button class="item-del-btn" title="Eliminar etapa" onclick="event.stopPropagation();eliminarEtapaDesdeLista('${et.id}')">×</button>
          </div>
        </div>`;

      // Sub-etapas
      if (hasSubEtapas) {
        et.subEtapas.forEach(function (sub) {
          var subPillCls = sub.estado === 'Completada' ? 'pill-completada' : sub.estado === 'En curso' ? 'pill-en-curso' : 'pill-pendiente';
          var subBarColor = sub.estado === 'Completada' ? '#4caf50' : sub.estado === 'En curso' ? '#f5a623' : '#2e2e2e';
          var subBarW = sub.estado === 'Completada' ? 100 : sub.estado === 'En curso' ? 50 : 0;
          var subFechas = '';
          if (sub.fecha_ini_plan) subFechas += 'Plan: ' + sub.fecha_ini_plan + ' → ' + (sub.fecha_fin_plan || '?');
          if (sub.fecha_ini_real) subFechas += (subFechas ? ' · ' : '') + 'Real: ' + sub.fecha_ini_real + (sub.fecha_fin_real ? ' → ' + sub.fecha_fin_real : '…');

          html += `
            <div class="subetapa-row subetapa-${et.id}" style="display:none;padding-left:40px;background:#fafafa">
              <div style="display:flex;align-items:center;width:100%;gap:8px">
                <div style="width:24px;color:#ccc">└</div>
                <div style="flex:1;cursor:pointer" onclick="editarSubEtapaUI('${sub.id}', '${et.id}')">
                  <div class="etapa-nombre" style="font-size:13px">${sub.nombre}</div>
                  ${sub.descripcion ? '<div class="etapa-meta">' + sub.descripcion + '</div>' : ''}
                  ${subFechas ? '<div class="etapa-meta" style="margin-top:2px;font-size:11px">' + subFechas + '</div>' : ''}
                  <div class="etapa-bar-wrap">
                    <div class="etapa-mini-track"><div class="etapa-mini-fill" style="width:${subBarW}%;background:${subBarColor}"></div></div>
                  </div>
                </div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;justify-content:flex-end">
                <span class="etapa-pill ${subPillCls}" style="font-size:10px">${sub.estado}</span>
                <button class="item-del-btn" title="Editar" onclick="event.stopPropagation();editarSubEtapaUI('${sub.id}', '${et.id}')">✎</button>
                <button class="item-del-btn" title="Eliminar" onclick="event.stopPropagation();eliminarSubEtapaUI('${sub.id}', '${et.id}')">×</button>
              </div>
            </div>`;
        });
      }
    });

    cont.innerHTML = html;
  }

  // ── MODAL NUEVO CONTRATO ──────────────────────────────────────
  function poblarSelectContratos() {
    // Select de clientes
    var selCli = document.getElementById('con_cliente');
    if (selCli) {
      selCli.innerHTML = '<option value="">— Seleccione —</option>';
      APP.clientes.forEach(function (c) {
        var op = document.createElement('option');
        op.value = c.id;
        op.textContent = c.nombre;
        op.dataset.nit = c.nit || '';
        selCli.appendChild(op);
      });
    }

    // Select de cotizaciones
    var sel = document.getElementById('con_cotizacion');
    if (!sel) return;
    sel.innerHTML = '<option value="">— Seleccione cotización —</option>';
    if (!CON.cotizaciones.length) {
      sel.innerHTML = '<option value="">— No hay cotizaciones aprobadas disponibles —</option>';
      return;
    }
    CON.cotizaciones.forEach(function (c) {
      var op = document.createElement('option');
      op.value = c.id;
      op.textContent = c.consecutivo + ' · ' + c.nombre_cliente + ' · ' + (c.proyecto || '');
      op.dataset.cliente = c.id_cliente;
      op.dataset.nombre = c.nombre_cliente;
      op.dataset.nit = c.nit_cliente || '';
      op.dataset.proyecto = c.proyecto || '';
      op.dataset.direccion = c.direccion_obra || '';
      op.dataset.ciudad = c.ciudad_obra || 'Bogotá';
      op.dataset.valor = c.valor_total || 0;
      op.dataset.consecutivo = c.consecutivo;
      sel.appendChild(op);
    });
  }

    CON.contratoEditId = null;
    CON.etapasModal = [];
    renderEtapasModal();
    setModoModalContrato('crear');

    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('con_id').value = '';
    document.getElementById('con_fecha_firma').value = hoy;
    document.getElementById('con_fecha_inicio').value = hoy;
    document.getElementById('con_fecha_fin').value = '';
    document.getElementById('con_proyecto').value = '';
    document.getElementById('con_valor').value = '';
    document.getElementById('con_cotizacion').value = '';
    document.getElementById('con_cliente').value = '';
    document.getElementById('con_nit').value = '';
    document.getElementById('con_direccion').value = '';
    document.getElementById('con_ciudad').value = 'Bogotá';
    document.getElementById('con_origen').value = 'cotizacion';
    toggleOrigenContrato();

    }

          CON.cotizaciones = res.cotizaciones || [];
        } else {
          toast('No se pudieron cargar cotizaciones aprobadas', 'error');
        }

      })
      .withFailureHandler(function (e) {

        toast('Error al cargar cotizaciones: ' + e.message, 'error');
        abrirYAutocompletar();
      })
      .getDashboardContratos();

  function editarContratoActual() {
    var c = CON.contratos.find(function (x) { return String(x.id) === String(CON.activo); });
    if (!c) { toast('Selecciona un contrato', 'error'); return; }

    CON.contratoEditId = c.id;
    CON.etapasModal = [];
    renderEtapasModal();
    setModoModalContrato('editar');

    document.getElementById('con_id').value = c.id;
    document.getElementById('con_fecha_firma').value = toInputDate(c.fecha_firma);
    document.getElementById('con_fecha_inicio').value = toInputDate(c.fecha_inicio);
    document.getElementById('con_fecha_fin').value = toInputDate(c.fecha_fin_est);
    document.getElementById('con_proyecto').value = c.proyecto || '';
    document.getElementById('con_valor').value = c.valor_total || '';
    document.getElementById('con_direccion').value = c.direccion_obra || '';
    document.getElementById('con_ciudad').value = c.ciudad_obra || 'Bogotá';
    document.getElementById('con_nit').value = c.nit_cliente || '';
    document.getElementById('con_origen').value = c.id_cotizacion ? 'cotizacion' : 'manual';

    poblarSelectContratos();
    var selCli = document.getElementById('con_cliente');
    for (var i = 0; i < selCli.options.length; i++) {
      if (String(selCli.options[i].value) === String(c.id_cliente)) {
        selCli.selectedIndex = i;
        break;
      }
    }

    var selCot = document.getElementById('con_cotizacion');
    if (c.id_cotizacion && selCot) {
      for (var j = 0; j < selCot.options.length; j++) {
        if (String(selCot.options[j].value) === String(c.id_cotizacion)) {
          selCot.selectedIndex = j;
          break;
        }
      }
    }

    toggleOrigenContrato();
    abrirModal('modal-contrato');

  function toggleOrigenContrato() {
    var origen = document.getElementById('con_origen').value;
    document.getElementById('con-desde-cot').style.display = origen === 'cotizacion' ? 'block' : 'none';
    var btnAutogen = document.getElementById('btn-modal-etapa-autogen');

      var enEdicion = !!document.getElementById('con_id').value;
