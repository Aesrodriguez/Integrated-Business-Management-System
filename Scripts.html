  function escAttr(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function cargarDatosDeCot() {
    var sel = document.getElementById('con_cotizacion');
    if (!sel || sel.selectedIndex < 0) return;
    var opt = sel.options[sel.selectedIndex];
    if (!opt.value) return;
    document.getElementById('con_proyecto').value = opt.dataset.proyecto || '';
    document.getElementById('con_valor').value = opt.dataset.valor || '';
    document.getElementById('con_nit').value = opt.dataset.nit || '';
    document.getElementById('con_direccion').value = opt.dataset.direccion || '';
    document.getElementById('con_ciudad').value = opt.dataset.ciudad || 'Bogotá';
    // Buscar cliente en el select
    var selCli = document.getElementById('con_cliente');
    for (var i = 0; i < selCli.options.length; i++) {
      if (String(selCli.options[i].value) === String(opt.dataset.cliente)) {
        selCli.selectedIndex = i; break;
      }
    }

    if (!document.getElementById('con_id').value) {
      generarEtapasDesdeCotizacionSeleccionada();
    }
  }

  function generarEtapasDesdeCotizacionSeleccionada() {
    var origen = document.getElementById('con_origen').value;
    if (origen !== 'cotizacion') {
      toast('Esta opción aplica para contratos desde cotización', 'error');
      return;
    }

    var sel = document.getElementById('con_cotizacion');
    if (!sel || sel.selectedIndex < 0) return;
    var idCot = sel.value;
    if (!idCot) {
      toast('Selecciona una cotización primero', 'error');
      return;
    }

    var cot = CON.cotizaciones.find(function (c) { return String(c.id) === String(idCot); });
    if (!cot) {
      toast('No se encontró la cotización seleccionada', 'error');
      return;
    }

    var valorContrato = parseFloat(document.getElementById('con_valor').value) || parseFloat(cot.valor_total) || 0;
    if (valorContrato <= 0) {
      toast('Define un valor de contrato mayor a 0 para calcular porcentajes', 'error');
      return;
    }

    var items = Array.isArray(cot.items) ? cot.items : [];
    if (!items.length) {
      toast('La cotización no tiene ítems para dividir etapas', 'error');
      return;
    }

    CON.etapasModal = items
      .filter(function (it) { return (parseFloat(it.subtotal) || 0) > 0; })
      .map(function (it) {
        var subtotal = parseFloat(it.subtotal) || 0;
        var porcentaje = (subtotal / valorContrato) * 100;
        var porcentajeRedondeado = Math.round(porcentaje * 100) / 100;
        return {
          nombre: it.descripcion || ('Item ' + (it.id_item || '')),
          descripcion: (it.categoria || 'General') + ' · ' + (it.unidad || 'Und') + ' · ' + fmtCOP(subtotal),
          peso: porcentajeRedondeado,
          estado: 'Pendiente'
        };
      });

    renderEtapasModal();
    toast('Etapas generadas desde ítems de la cotización', 'ok');
  }

  function cargarDatosClienteCon() {
    var sel = document.getElementById('con_cliente');
    if (!sel || sel.selectedIndex < 0) return;
    var opt = sel.options[sel.selectedIndex];
    document.getElementById('con_nit').value = opt.dataset.nit || '';
  }

    renderEtapasModal();

  function renderEtapasModal() {
    var cont = document.getElementById('modal-etapas-lista');
    if (!CON.etapasModal.length) { cont.innerHTML = ''; return; }
    cont.innerHTML = CON.etapasModal.map(function (et, i) {
      var estado = et.estado || 'Pendiente';
      return `
        <div class="modal-etapa-item">
          <input type="text" class="input-field" placeholder="Nombre etapa" value="${escAttr(et.nombre || '')}" oninput="CON.etapasModal[${i}].nombre=this.value">
          <input type="number" class="input-field" placeholder="Peso %" value="${et.peso || ''}" min="0" max="100" oninput="CON.etapasModal[${i}].peso=parseFloat(this.value)||0;validarPesosModal()">
          <input type="text" class="input-field" placeholder="Descripción" value="${escAttr(et.descripcion || '')}" oninput="CON.etapasModal[${i}].descripcion=this.value">
          <select class="input-field" onchange="CON.etapasModal[${i}].estado=this.value">
            <option${estado === 'Pendiente' ? ' selected' : ''}>Pendiente</option><option${estado === 'En curso' ? ' selected' : ''}>En curso</option><option${estado === 'Completada' ? ' selected' : ''}>Completada</option>
          </select>
          <button class="item-del-btn" onclick="CON.etapasModal.splice(${i},1);renderEtapasModal()">×</button>
        </div>`;
    }).join('');
    validarPesosModal();
  }

  function validarPesosModal() {
    var suma = CON.etapasModal.reduce(function (s, e) { return s + (parseFloat(e.peso) || 0); }, 0);
    var warn = document.getElementById('modal-etapas-warn');
    if (warn) warn.style.display = (CON.etapasModal.length && suma > 100.5) ? 'block' : 'none';
  }

  function guardarContratoFormulario() {
    var selCli = document.getElementById('con_cliente');
    var proyecto = document.getElementById('con_proyecto').value.trim();
    var valor = document.getElementById('con_valor').value;
    var origen = document.getElementById('con_origen').value;
    var selCot = document.getElementById('con_cotizacion');
    var idContrato = document.getElementById('con_id').value;

    if (!selCli.value) { toast('Selecciona un cliente', 'error'); return; }
    if (!proyecto) { toast('Ingresa el nombre del proyecto', 'error'); return; }
    if (!valor) { toast('Ingresa el valor del contrato', 'error'); return; }

    var clienteOpt = selCli.options[selCli.selectedIndex];
    var cliente = APP.clientes.find(function (c) { return String(c.id) === String(selCli.value); }) || {};
    var cotOpt = origen === 'cotizacion' ? selCot.options[selCot.selectedIndex] : null;

    var datos = {
      id_contrato: idContrato,
      id_cliente: selCli.value,
      nombre_cliente: clienteOpt.textContent,
      nit_cliente: document.getElementById('con_nit').value,
      proyecto: proyecto,
      direccion_obra: document.getElementById('con_direccion').value,
      ciudad_obra: document.getElementById('con_ciudad').value || 'Bogotá',
      valor_total: valor,
      fecha_firma: document.getElementById('con_fecha_firma').value,
      fecha_inicio: document.getElementById('con_fecha_inicio').value,
      fecha_fin_est: document.getElementById('con_fecha_fin').value,
      id_cotizacion: cotOpt ? cotOpt.value : '',
      consecutivo_cot: cotOpt ? cotOpt.dataset.consecutivo : '',
      etapas: CON.etapasModal.filter(function (e) { return e.nombre; }).map(function (e) {
        return {
          id: e.id || '',
          nombre: e.nombre,
          descripcion: e.descripcion || '',
          peso_pct: e.peso || 0,
          estado: e.estado || 'Pendiente'
        };
      })
    };

    var enEdicion = !!idContrato;
    mostrarLoader(enEdicion ? 'Actualizando contrato...' : 'Creando contrato...');
    var handler = function (res) {
      ocultarLoader();
      if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
      cerrarModal('modal-contrato');
      toast('✓ ' + res.mensaje, 'ok');
      CON.contratoEditId = null;
      cargarContratos();
    };

    var failure = function (e) {
      ocultarLoader();
      toast('Error: ' + e.message, 'error');
    };

    if (enEdicion) {
      google.script.run.withSuccessHandler(handler).withFailureHandler(failure).actualizarContrato(datos);
      return;
    }

    google.script.run.withSuccessHandler(handler).withFailureHandler(failure).crearContrato(datos);
  }

  function eliminarContratoActual() {
    var id = document.getElementById('con_id').value || CON.activo;
    if (!id) { toast('Selecciona un contrato', 'error'); return; }
    if (!confirm('¿Eliminar este contrato? También se eliminarán sus etapas y pagos.')) return;

    mostrarLoader('Eliminando contrato...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        cerrarModal('modal-contrato');
        toast('Contrato eliminado', 'ok');
        CON.contratoEditId = null;
        CON.activo = null;
        cargarContratos();
      })
      .withFailureHandler(function (e) {
        ocultarLoader();
        toast('Error: ' + e.message, 'error');
      })
      .eliminarContrato(id);
  }

      descripcion: document.getElementById('et_descripcion').value.trim(),

      fecha_inicio_real: document.getElementById('et_ini_real').value,
      fecha_fin_real: document.getElementById('et_fin_real').value,
      observaciones: document.getElementById('et_obs').value
    };

    if (!cambios.nombre_etapa) { toast('Ingresa el nombre de la etapa', 'error'); return; }
    if (!cambios.id_contrato) { toast('No hay contrato activo para la etapa', 'error'); return; }
    var contratoActual = CON.contratos.find(function (c) { return String(c.id) === String(cambios.id_contrato); }) || {};
    cambios.consecutivo_contrato = contratoActual.consecutivo || '';

    var accion = id ? 'Actualizando etapa...' : 'Guardando etapa...';
    mostrarLoader(accion);
    if (id) {
      google.script.run
        .withSuccessHandler(function (res) {
          ocultarLoader();
          if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
          cerrarModal('modal-etapa');
          toast('Etapa actualizada', 'ok');
          cargarContratos();
          setTimeout(function () { seleccionarContrato(CON.activo); }, 600);
        })
        .withFailureHandler(function (e) { ocultarLoader(); toast(e.message, 'error'); })
        .actualizarEtapa(id, cambios);
      return;
    }

    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        cerrarModal('modal-etapa');
        toast('Etapa creada', 'ok');
        cargarContratos();
        setTimeout(function () { seleccionarContrato(CON.activo); }, 600);
      })
      .withFailureHandler(function (e) { ocultarLoader(); toast(e.message, 'error'); })
      .guardarEtapa(cambios);

  // ── SUB-ETAPAS (CRUD) ──────────────────────────────────────
  function toggleSubEtapas(idEtapa, event) {
    event.stopPropagation();
    var btn = event.target;
    var rows = document.querySelectorAll('.subetapa-' + idEtapa);
    var isHidden = rows[0] && rows[0].style.display === 'none';
    rows.forEach(function (r) { r.style.display = isHidden ? 'flex' : 'none'; });
    btn.textContent = isHidden ? '▼' : '▶';
  }

  function mostrarModalNuevaSubEtapa(idEtapa) {
    document.getElementById('subetapa_id').value = '';
    document.getElementById('subetapa_id_etapa').value = idEtapa;
    document.getElementById('subetapa_nombre').value = '';
    document.getElementById('subetapa_descripcion').value = '';
    document.getElementById('subetapa_estado').value = 'Pendiente';
    document.getElementById('subetapa_fecha_inicio_plan').value = '';
    document.getElementById('subetapa_fecha_fin_plan').value = '';
    document.getElementById('subetapa_fecha_inicio_real').value = '';
    document.getElementById('subetapa_fecha_fin_real').value = '';
    document.getElementById('subetapa_obs').value = '';
    document.getElementById('btn-eliminar-subetapa').style.display = 'none';
    document.getElementById('modal-subetapa-titulo').textContent = 'Nueva Sub-etapa';
    abrirModal('modal-subetapa');
  }

  function editarSubEtapaUI(idSubEtapa, idEtapa) {
    var etapa = CON.etapas.find(function (e) { return String(e.id) === String(idEtapa); });
    if (!etapa) return;
    var subEtapa = etapa.subEtapas.find(function (s) { return String(s.id) === String(idSubEtapa); });
    if (!subEtapa) return;

    document.getElementById('subetapa_id').value = subEtapa.id;
    document.getElementById('subetapa_id_etapa').value = idEtapa;
    document.getElementById('subetapa_nombre').value = subEtapa.nombre;
    document.getElementById('subetapa_descripcion').value = subEtapa.descripcion;
    document.getElementById('subetapa_estado').value = subEtapa.estado;
    document.getElementById('subetapa_fecha_inicio_plan').value = subEtapa.fecha_ini_plan;
    document.getElementById('subetapa_fecha_fin_plan').value = subEtapa.fecha_fin_plan;
    document.getElementById('subetapa_fecha_inicio_real').value = subEtapa.fecha_ini_real;
    document.getElementById('subetapa_fecha_fin_real').value = subEtapa.fecha_fin_real;
    document.getElementById('subetapa_obs').value = subEtapa.observaciones;
    document.getElementById('btn-eliminar-subetapa').style.display = 'inline-block';
    document.getElementById('modal-subetapa-titulo').textContent = 'Editar Sub-etapa';
    abrirModal('modal-subetapa');
  }

          cerrarModal('modal-subetapa');
          toast('Sub-etapa actualizada', 'ok');
          cargarContratos();

    } else {
      google.script.run
        .withSuccessHandler(function (res) {
          ocultarLoader();
          if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
          cerrarModal('modal-subetapa');
          toast('Sub-etapa creada', 'ok');
          cargarContratos();
          setTimeout(function () { seleccionarContrato(CON.activo); }, 600);

  // ── PAGOS ─────────────────────────────────────────────────────
  function abrirModalPago() {
    var hoy = new Date().toISOString().split('T')[0];
    document.getElementById('pago_valor').value = '';
    document.getElementById('pago_fecha').value = hoy;
    document.getElementById('pago_ref').value = '';
    document.getElementById('pago_obs').value = '';
    var c = CON.contratos.find(function (x) { return String(x.id) === String(CON.activo); });
    if (c) {
      document.getElementById('pago-saldo-info').innerHTML =
        'Valor contrato: <strong style="color:#c8f135">' + fmtCOP(c.valor_total) + '</strong> · ' +
        'Ya pagado: <strong style="color:#4caf50">' + fmtCOP(c.total_pagado) + '</strong> · ' +
        'Saldo: <strong style="color:#f5a623">' + fmtCOP(c.saldo) + '</strong>';
    }
    abrirModal('modal-pago');
  }

  function confirmarPago() {
    var valor = parseFloat(document.getElementById('pago_valor').value) || 0;
    var fecha = document.getElementById('pago_fecha').value;
    if (!valor) { toast('Ingresa el valor del pago', 'error'); return; }
    if (!fecha) { toast('Ingresa la fecha', 'error'); return; }

    var c = CON.contratos.find(function (x) { return String(x.id) === String(CON.activo); });
    var datos = {
      id_contrato: CON.activo,
      consecutivo_contrato: (c || {}).consecutivo || '',
      tipo_pago: document.getElementById('pago_tipo').value,
      valor: valor,
      fecha_pago: fecha,
      metodo_pago: document.getElementById('pago_metodo').value,
      referencia: document.getElementById('pago_ref').value,
      observaciones: document.getElementById('pago_obs').value
    };

    mostrarLoader('Registrando pago...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        cerrarModal('modal-pago');
        if (!res.ok) { toast('Error: ' + (res.error || ''), 'error'); return; }
        toast('✓ Pago registrado', 'ok');
        cargarContratos();
        setTimeout(function () { seleccionarContrato(CON.activo); switchConTab('pagos'); }, 600);
      })
      .withFailureHandler(function (e) { ocultarLoader(); toast(e.message, 'error'); })
      .registrarPago(datos);
  }

  // ── CAMBIAR ESTADO ────────────────────────────────────────────
  function cambiarEstadoContrato() {
    var estados = ['Activo', 'En pausa', 'Finalizado', 'Cancelado'];
    var c = CON.contratos.find(function (x) { return String(x.id) === String(CON.activo); });
    var actual = c ? c.estado : 'Activo';
    var nuevo = prompt('Estado actual: ' + actual + '\nNuevo estado (Activo / En pausa / Finalizado / Cancelado):');
    if (!nuevo || !estados.includes(nuevo)) { toast('Estado no válido', 'error'); return; }
    mostrarLoader('Actualizando...');
    google.script.run
      .withSuccessHandler(function (res) {
        ocultarLoader();
        if (!res.ok) { toast('Error', 'error'); return; }
        toast('Estado actualizado a: ' + nuevo, 'ok');
        cargarContratos();
      })
      .withFailureHandler(function (e) { ocultarLoader(); toast(e.message, 'error'); })
      .actualizarEstadoContrato(CON.activo, nuevo);
  }

  function toInputDate(valor) {
    if (!valor) return '';
    if (typeof valor !== 'string') {
      var fecha = new Date(valor);
      if (isNaN(fecha.getTime())) return '';
      return fecha.toISOString().split('T')[0];
    }
    var partes = valor.split('/');
    if (partes.length === 3) return partes[2] + '-' + partes[1] + '-' + partes[0];
    return valor;
  }

  // ── UTILIDADES ────────────────────────────────────────────────
  function isoDate(ddmmyyyy) {
    if (!ddmmyyyy) return '';
    var parts = ddmmyyyy.split('/');
    if (parts.length === 3) return parts[2] + '-' + parts[1] + '-' + parts[0];
    return ddmmyyyy;
  }
