<style>
  /* ═══════════════════════════════════════════════════════════
   TRIPLE A — SISTEMA DE COTIZACIONES
   Archivo: Styles.html
   ═══════════════════════════════════════════════════════════ */

  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --black: #0a0a0a;
    --bg: #111111;
    --surface: #1a1a1a;
    --card: #1e1e1e;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --muted: #555;
    --dust: #8a8a8a;
    --text: #e8e4da;
    --lime: #c8f135;
    --amber: #f5a623;
    --danger: #e84040;
    --success: #4caf50;
    --sidebar-w: 220px;
    --radius: 4px;
  }

  body.theme-light {
    --black: #f8f7f3;
    --bg: #efede7;
    --surface: #ffffff;
    --card: #ffffff;
    --border: #ded8cb;
    --border2: #cfc7b7;
    --muted: #6f6a5f;
    --dust: #7f786a;
    --text: #1e1b17;
    --lime: #5b7f1d;
    --amber: #b56d00;
    --danger: #c43b3b;
    --success: #2f8a46;
    color-scheme: light;
  }

  body {
    color-scheme: dark;
    transition: background-color 0.25s ease, color 0.25s ease;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── LAYOUT ──────────────────────────────────────────────── */
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: var(--sidebar-w);
    background: var(--black);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 100;
    transition: transform 0.25s ease;
  }

  .sidebar-logo {
    padding: 28px 20px 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.04em;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo span {
    background: var(--surface);
    color: var(--lime);
    padding: 0 3px;
  }

  .sidebar-sub {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    color: var(--dust);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
    font-weight: 300;
  }

  .sidebar-nav {
    padding: 16px 0;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--dust);
    cursor: pointer;
    transition: all 0.2s;
    border-left: 2px solid transparent;
  }

  .nav-item:hover {
    color: var(--text);
    background: var(--surface);
  }

  .nav-item.active {
    color: var(--lime);
    border-left-color: var(--lime);
    background: rgba(200, 241, 53, 0.06);
    font-weight: 500;
  }

  .nav-icon {
    font-size: 16px;
  }

  .sidebar-footer {
    padding: 16px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  .main-content {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: margin-left 0.25s ease;
  }

  body.sidebar-collapsed .sidebar {
    transform: translateX(calc(-1 * var(--sidebar-w)));
  }

  body.sidebar-collapsed .main-content {
    margin-left: 0;
  }

  .topbar {
    position: sticky;
    top: 0;
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
  }

  .topbar-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-toggle-sidebar {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dust);
    width: 34px;
    height: 34px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: all 0.2s;
  }

  .btn-toggle-sidebar:hover {
    border-color: var(--lime);
    color: var(--lime);
    background: rgba(200, 241, 53, 0.06);
  }

  .btn-theme-toggle {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dust);
    width: 34px;
    height: 34px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 15px;
    line-height: 1;
    transition: all 0.2s;
  }

  .btn-theme-toggle:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(245, 166, 35, 0.06);
  }

  .topbar-actions {
    display: flex;
    gap: 10px;
  }

  .vista {
    padding: 24px 28px;
    flex: 1;
  }

  /* ── CARDS ───────────────────────────────────────────────── */
  .card {
    --card-bg: var(--card);
    --card-border-color: var(--border);
    --card-radius: var(--radius);
    --card-padding: 20px;
    --card-gap: 16px;
    --card-margin: 16px;
    --card-overflow: visible;
    background: var(--card-bg);
    border: 1px solid var(--card-border-color);
    border-radius: var(--card-radius);
    padding: var(--card-padding);
    margin-bottom: var(--card-margin);
    min-width: 0;
    overflow: var(--card-overflow);
    display: flex;
    flex-direction: column;
    gap: var(--card-gap);
  }

  .card-header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dust);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card--panel {
    --card-padding: 0;
    --card-gap: 0;
    --card-margin: 0;
    --card-overflow: hidden;
  }

  .card--compact {
    --card-padding: 14px;
    --card-gap: 10px;
  }

  .card--spacious {
    --card-padding: 28px;
    --card-gap: 20px;
  }

  .card--soft {
    --card-bg: rgba(255, 255, 255, 0.02);
  }

  .card--aiu {
    --card-border-color: rgba(245, 166, 35, 0.3);
    --card-bg: rgba(245, 166, 35, 0.04);
  }

  .card--resumen {
    --card-bg: var(--black);
    --card-border-color: var(--border);
  }

  .card-header--spaced {
    padding: 14px 20px;
  }

  .card-header--compact {
    margin-bottom: 10px;
  }

  .card-header--micro {
    padding: 0;
    margin: 0 0 10px;
    font-size: 11px;
  }

  .card-header--micro-tight {
    padding: 0;
    margin: 0 0 12px;
    font-size: 12px;
  }

  .card-header--micro-spaced {
    padding: 0;
    margin: 4px 0 8px;
    font-size: 11px;
  }

  .u-hidden {
    display: none !important;
  }

  .u-flex {
    display: flex;
  }

  .u-align-center {
    align-items: center;
  }

  .u-flex-between {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .u-flex-end-wrap {
    display: flex;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 6px;
  }

  .u-gap-4 {
    gap: 4px;
  }

  .u-gap-6 {
    gap: 6px;
  }

  .u-gap-8 {
    gap: 8px;
  }

  .u-gap-12 {
    gap: 12px;
  }

  .u-gap-16 {
    gap: 16px;
  }

  .u-grid-2 {
    grid-template-columns: 1fr 1fr;
  }

  .u-ml-auto {
    margin-left: auto;
  }

  .u-mt-4 {
    margin-top: 4px;
  }

  .u-mt-8 {
    margin-top: 8px;
  }

  .u-mt-10 {
    margin-top: 10px;
  }

  .u-mt-12 {
    margin-top: 12px;
  }

  .u-mt-18 {
    margin-top: 18px;
  }

  .u-mb-0 {
    margin-bottom: 0;
  }

  .u-mb-12 {
    margin-bottom: 12px;
  }

  .u-pad-12-16 {
    padding: 12px 16px;
  }

  .u-pad-14-20 {
    padding: 14px 20px;
  }

  .u-pad-16-20 {
    padding: 16px 20px;
  }

  .u-pad-28 {
    padding: 28px;
  }

  .u-pad-32-center {
    text-align: center;
    padding: 32px;
  }

  .u-pad-40-center {
    text-align: center;
    padding: 40px;
  }

  .u-overflow-hidden {
    overflow: hidden;
  }

  .u-overflow-auto {
    overflow: auto;
  }

  .u-max-h-580 {
    max-height: 580px;
  }

  .u-text-right {
    text-align: right;
  }

  .u-width-100 {
    width: 100%;
  }

  .u-width-220 {
    width: 220px;
  }

  .u-width-150 {
    width: 150px;
  }

  .u-h-32 {
    height: 32px;
  }

  .u-border-top {
    border-top: 1px solid var(--border);
  }

  .u-border-bottom {
    border-bottom: 1px solid var(--border);
  }

  .u-border-radius-4 {
    border-radius: 4px;
  }

  .u-bg-black-soft {
    background: #111;
  }

  .u-color-muted {
    color: #555;
  }

  .u-color-dust {
    color: var(--dust);
  }

  .u-color-lime {
    color: var(--lime);
  }

  .card-aiu {
    border-color: rgba(245, 166, 35, 0.3);
    background: rgba(245, 166, 35, 0.04);
  }

  .card-resumen {
    background: var(--black);
    border-color: var(--border);
  }

  .card-note {
    font-size: 12px;
    color: var(--amber);
    background: rgba(245, 166, 35, 0.07);
    border: 1px solid rgba(245, 166, 35, 0.2);
    padding: 8px 12px;
    border-radius: var(--radius);
    margin-bottom: 14px;
  }

  /* ── FORM GRID ───────────────────────────────────────────── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 20px;
    align-items: start;
  }

  .form-col {
    display: flex;
    flex-direction: column;
  }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group:last-child {
    margin-bottom: 0;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--dust);
    margin-bottom: 5px;
    letter-spacing: 0.05em;
  }

  .form-row {
    display: flex;
    gap: 12px;
  }

  .form-row.two-col>* {
    flex: 1;
  }

  .form-row.three-col>* {
    flex: 1;
  }

  .form-row.four-col>* {
    flex: 1;
  }

  .field-hint {
    font-size: 10px;
    color: var(--amber);
    margin-top: 4px;
    display: block;
  }

  /* ── INPUTS ─────────────────────────────────────────────── */
  .input-field {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }

  .input-field:focus {
    border-color: var(--lime);
  }

  .input-field::placeholder {
    color: var(--muted);
  }

  select.input-field {
    cursor: pointer;
  }

  option {
    background: var(--surface);
  }

  .textarea {
    resize: vertical;
    min-height: 80px;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .apu-ref-box {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #111;
    color: var(--dust);
    font-size: 12px;
    min-height: 38px;
    display: flex;
    align-items: center;
  }

  .apu-summary-grid {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: #101010;
    padding: 10px 12px;
    max-width: 430px;
    margin-left: auto;
  }

  .apu-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--dust);
    padding: 4px 0;
    border-bottom: 1px dashed #2f2f2f;
  }

  .apu-summary-row strong {
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
  }

  .apu-summary-total {
    border-top: 1px solid var(--border);
    border-bottom: none;
    margin-top: 6px;
    padding-top: 8px;
    font-size: 13px;
  }

  .apu-summary-total strong {
    color: var(--lime);
    font-size: 14px;
  }

  /* ── TIPO SELECTOR ───────────────────────────────────────── */
  .tipo-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .tipo-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .tipo-btn:hover {
    border-color: var(--lime);
  }

  .tipo-btn.active {
    border-color: var(--lime);
    background: rgba(200, 241, 53, 0.07);
  }

  .tipo-icon {
    font-size: 24px;
    color: var(--dust);
    margin-bottom: 6px;
  }

  .tipo-btn.active .tipo-icon {
    color: var(--lime);
  }

  .tipo-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 4px;
  }

  .tipo-btn.active .tipo-name {
    color: var(--lime);
  }

  .tipo-desc {
    font-size: 11px;
    color: var(--dust);
    line-height: 1.4;
  }

  /* ── TABLA DE ÍTEMS ─────────────────────────────────────── */
  .items-wrap {
    overflow-x: auto;
  }

  .items-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .items-table th {
    background: var(--black);
    color: var(--dust);
    padding: 8px 10px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 400;
    border-bottom: 1px solid var(--border);
  }

  .items-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .items-table tr:hover td {
    background: rgba(255, 255, 255, 0.02);
  }

  .items-table td.num {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
  }

  .item-del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: var(--radius);
    transition: color 0.2s, background 0.2s;
  }

  .item-del-btn:hover {
    color: var(--danger);
    background: rgba(232, 64, 64, 0.1);
  }

  /* ── RESUMEN ─────────────────────────────────────────────── */
  .resumen-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .resumen-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
  }

  .resumen-row:hover {
    background: var(--surface);
  }

  .aiu-row {
    font-size: 12px;
    color: var(--dust);
    padding: 5px 12px;
  }

  .hint-row {
    font-size: 11px;
    color: var(--muted);
  }

  .resumen-total {
    border-top: 1px solid var(--border2);
    margin-top: 6px;
    padding-top: 12px;
    font-size: 18px;
    font-weight: 600;
    color: var(--lime);
  }

  .resumen-total span:last-child {
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ── DATA TABLE ─────────────────────────────────────────── */
  .table-wrap {
    overflow-x: auto;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table th {
    background: var(--black);
    color: var(--dust);
    padding: 10px 12px;
    text-align: left;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    font-weight: 400;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .data-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .data-table tr:hover td {
    background: rgba(200, 241, 53, 0.03);
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
  }

  .badge-borrador {
    background: rgba(100, 100, 100, 0.2);
    color: var(--dust);
  }

  .badge-emitida {
    background: rgba(76, 175, 80, 0.15);
    color: #81c784;
  }

  .badge-inactiva {
    background: rgba(232, 64, 64, 0.15);
    color: #ff8a80;
  }

  .badge-iva {
    background: rgba(200, 241, 53, 0.1);
    color: var(--lime);
  }

  .badge-aiu {
    background: rgba(245, 166, 35, 0.1);
    color: var(--amber);
  }

  .badge-empleado {
    background: rgba(76, 175, 80, 0.15);
    color: #81c784;
  }

  .badge-proveedor {
    background: rgba(245, 166, 35, 0.15);
    color: #ffd28b;
  }

  /* ── BOTONES ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius);
    border: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--lime);
    color: var(--black);
  }

  .btn-primary:hover {
    background: #b8e020;
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    border-color: var(--lime);
    color: var(--lime);
  }

  .btn-sm {
    padding: 5px 12px;
    font-size: 12px;
  }

  .btn-link {
    background: none;
    border: none;
    color: var(--lime);
    padding: 4px 6px;
    font-size: 12px;
    cursor: pointer;
  }

  .btn-link:hover {
    text-decoration: underline;
  }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  .modal-overlay.open {
    display: flex;
  }

  @keyframes fadeIn {
    from {
      opacity: 0
    }

    to {
      opacity: 1
    }
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 540px;
    max-width: 95vw;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease;
  }

  .modal-sm {
    width: 380px;
  }

  @keyframes slideUp {
    from {
      transform: translateY(16px);
      opacity: 0
    }

    to {
      transform: translateY(0);
      opacity: 1
    }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dust);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--dust);
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
  }

  .modal-close:hover {
    color: var(--text);
  }

  .modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }

  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ── CATÁLOGO LISTA ─────────────────────────────────────── */
  .catalogo-lista {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 0;
  }

  .catalogo-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
